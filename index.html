<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1025">
<title>ਪੰਜਾਬੀ ਸਿੱਖੋ — Learn Punjabi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1025;color:#f0eef5;min-height:100vh;min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit}
:root{--saffron:#F5A623;--deep:#1a1025;--card:#241735;--card2:#2d1f42;--green:#34C759;--red:#FF3B5C;--blue:#5E8AFF;--purple:#9B6DFF;--text:#f0eef5;--muted:#8a7f9e;--border:#3a2d50}
.container{max-width:440px;margin:0 auto;padding:12px;padding-top:max(12px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom))}
.hidden{display:none!important}
.app-header{text-align:center;padding:20px 0 16px}
.app-header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-header p{color:var(--muted);font-size:13px;margin-top:4px}
.btn{padding:12px 24px;border:none;border-radius:12px;font-weight:700;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:var(--saffron);color:#1a1025}.btn-secondary{background:var(--card2);color:var(--text)}.btn-danger{background:var(--red);color:#fff}
.btn-full{width:100%}.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px}.btn:disabled{opacity:.4;cursor:default}
.input{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px}
.input:focus{outline:none;border-color:var(--saffron)}.input::placeholder{color:var(--muted)}
.label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}.field{margin-bottom:14px}
.panel{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
.panel-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.role-cards{display:flex;gap:12px;margin-top:20px}
.role-card{flex:1;background:var(--card);border:2px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--saffron);transform:translateY(-2px)}
.role-card .icon{font-size:40px;margin-bottom:8px}.role-card h3{font-size:16px;margin-bottom:4px}.role-card p{font-size:12px;color:var(--muted)}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:10px 6px;border:none;border-radius:9px;font-size:11px;font-weight:700;background:transparent;color:var(--muted);white-space:nowrap;min-width:60px}
.tab.active{background:var(--saffron);color:#1a1025}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s}
.chip.active{background:var(--saffron);color:#1a1025;border-color:var(--saffron)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flashcard{background:var(--card);border-radius:16px;overflow:hidden;min-height:300px;position:relative;margin-bottom:12px}
.flashcard-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--card2)}
.flashcard-body{padding:16px;text-align:center}
.flashcard-gurmukhi{font-size:32px;font-weight:800;margin-bottom:4px}
.flashcard-english{font-size:14px;color:var(--muted)}
.flashcard-hidden{filter:blur(20px);user-select:none}
.audio-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--saffron);color:#1a1025;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 15px rgba(245,166,35,.3)}
.audio-btn:active{transform:scale(.95)}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.quiz-pic-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;border:3px solid var(--border);cursor:pointer;transition:all .15s}
.quiz-pic-wrap:active{transform:scale(.96)}
.quiz-pic-wrap.correct{border-color:var(--green);box-shadow:0 0 20px rgba(52,199,89,.4)}
.quiz-pic-wrap.wrong{border-color:var(--red);box-shadow:0 0 20px rgba(255,59,92,.4)}
.quiz-pic-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.flash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:flashIn .4s ease-out forwards;pointer-events:none}
.flash-correct{background:rgba(52,199,89,.25)}.flash-wrong{background:rgba(255,59,92,.25)}
.flash-overlay span{font-size:64px;animation:popIn .3s ease-out}
@keyframes flashIn{0%{opacity:1}100%{opacity:0}}@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin-bottom:12px}
.score-item{text-align:center}.score-num{font-size:22px;font-weight:800}.score-label{font-size:10px;color:var(--muted);text-transform:uppercase}
.student-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.student-row:last-child{border-bottom:none}
.student-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.student-info{flex:1}.student-name{font-weight:600;font-size:14px}.student-stat{font-size:11px;color:var(--muted)}
.card-item{display:flex;gap:10px;padding:10px;background:var(--card2);border-radius:10px;margin-bottom:8px;align-items:center}
.card-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card)}
.card-text{flex:1;min-width:0}.card-text h4{font-size:14px;font-weight:600}.card-text p{font-size:11px;color:var(--muted)}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:8px}
.upload-area:hover{border-color:var(--saffron)}.upload-area.has-file{border-color:var(--green);border-style:solid}
.upload-area .icon{font-size:28px;margin-bottom:4px}.upload-area p{font-size:12px;color:var(--muted)}
.preview-img{max-width:100%;max-height:150px;border-radius:8px;margin-top:8px}
.record-row{display:flex;gap:8px;align-items:center}
.rec-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:18px;display:flex;align-items:center;justify-content:center}
.rec-btn.recording{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,.4)}50%{box-shadow:0 0 0 10px rgba(255,59,92,0)}}
.back-btn{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:8px 0;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}
.loader{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loading-screen p{color:var(--muted);font-size:13px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}.empty .icon{font-size:40px;margin-bottom:8px}.empty p{font-size:13px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;animation:toastIn .3s ease-out}
.toast-success{background:var(--green);color:#fff}.toast-error{background:var(--red);color:#fff}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Messages */
.msg-list{max-height:400px;overflow-y:auto;padding:4px 0}
.msg-bubble{max-width:85%;padding:10px 14px;border-radius:14px;margin-bottom:8px;font-size:13px;line-height:1.5;position:relative}
.msg-sent{background:var(--saffron);color:#1a1025;margin-left:auto;border-bottom-right-radius:4px}
.msg-received{background:var(--card2);color:var(--text);margin-right:auto;border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.6;margin-top:4px}
.msg-sender{font-size:10px;font-weight:700;color:var(--saffron);margin-bottom:2px}
.msg-compose{display:flex;gap:8px;margin-top:12px}
.msg-compose input{flex:1}
.msg-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
</style>
</head>
<body>
<div class="container" id="app"><div class="loading-screen"><div class="loader"></div><p>Loading ਪੰਜਾਬੀ ਸਿੱਖੋ...</p></div></div>
<script>
// ============================================================
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAonCmVIp_vhP5vbRDjP7Nlx5PB8piwubE",
  authDomain: "pathshala-28752.firebaseapp.com",
  projectId: "pathshala-28752",
  storageBucket: "pathshala-28752.firebasestorage.app",
  messagingSenderId: "238955568068",
  appId: "1:238955568068:web:c89ebe8983c9888874a291"
};
const TEACHER_PASSWORD = "punjabi123"; // Change this!
// ============================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const $ = id => document.getElementById(id);
const app = $('app');

let state = {
  role:null, studentName:'', studentId:'', view:'home', tab:'cards',
  selectedCat:null, quizCards:[], quizIndex:0, quizScore:0, quizTotal:0,
  quizStartTime:0, quizAnswered:false, flashIndex:0, flashRevealed:false,
  flashCards:[], categories:[], cards:[], students:[], loading:false,
  msgTo:null, unreadCount:0
};

// ---- Helpers ----
function toast(m,t='success'){const e=document.createElement('div');e.className='toast toast-'+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
function timeSince(ts){if(!ts)return'Never';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function fmtTime(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

// ---- Firebase ----
async function loadCategories(){const s=await db.collection('categories').orderBy('name').get();state.categories=s.docs.map(d=>({id:d.id,...d.data()}))}
async function loadCards(c){let q=db.collection('cards');if(c)q=q.where('categoryId','==',c);const s=await q.get();state.cards=s.docs.map(d=>({id:d.id,...d.data()}))}
async function loadAllCards(){const s=await db.collection('cards').get();state.cards=s.docs.map(d=>({id:d.id,...d.data()}))}
async function loadStudents(){const s=await db.collection('students').get();state.students=s.docs.map(d=>({id:d.id,...d.data()}))}

function compressImage(file,maxSize=400,quality=0.7){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize}}else{if(h>maxSize){w=w*maxSize/h;h=maxSize}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',quality))};img.onerror=()=>reject(new Error('Failed to load image'));img.src=e.target.result};
    r.onerror=()=>reject(new Error('Failed to read file'));r.readAsDataURL(file)})
}
function blobToBase64(b){return new Promise((r,j)=>{const f=new FileReader();f.onload=()=>r(f.result);f.onerror=()=>j(new Error('Failed'));f.readAsDataURL(b)})}

async function recordStudentActivity(type,data){
  if(state.role!=='student'||!state.studentId)return;
  await db.collection('students').doc(state.studentId).update({lastSeen:Date.now()});
  await db.collection('activity').add({studentId:state.studentId,studentName:state.studentName,type,...data,timestamp:Date.now()})
}

// ---- Audio ----
let currentAudio=null;
function playAudio(url){if(currentAudio){currentAudio.pause();currentAudio=null}if(!url)return;currentAudio=new Audio(url);currentAudio.play().catch(e=>console.log('Audio err:',e))}
let mediaRecorder=null,audioChunks=[],recordedBlob=null;

// ---- Messages ----
async function sendMessage(fromId,fromName,toId,toName,text){
  await db.collection('messages').add({fromId,fromName,toId,toName,text,timestamp:Date.now(),read:false})
}
async function getMessages(userId1,userId2){
  // Get messages between two users
  const s1=await db.collection('messages').where('fromId','==',userId1).where('toId','==',userId2).get();
  const s2=await db.collection('messages').where('fromId','==',userId2).where('toId','==',userId1).get();
  const msgs=[...s1.docs.map(d=>({id:d.id,...d.data()})),...s2.docs.map(d=>({id:d.id,...d.data()}))];
  msgs.sort((a,b)=>a.timestamp-b.timestamp);
  return msgs;
}
async function getUnreadCount(userId){
  const s=await db.collection('messages').where('toId','==',userId).where('read','==',false).get();
  return s.size;
}
async function markAsRead(userId,fromId){
  const s=await db.collection('messages').where('toId','==',userId).where('fromId','==',fromId).where('read','==',false).get();
  const batch=db.batch();s.docs.forEach(d=>batch.update(d.ref,{read:true}));
  if(s.docs.length>0)await batch.commit();
}
async function getTeacherUnreadPerStudent(){
  const s=await db.collection('messages').where('toId','==','teacher').where('read','==',false).get();
  const counts={};
  s.docs.forEach(d=>{const data=d.data();counts[data.fromId]=(counts[data.fromId]||0)+1});
  return counts;
}

// ==========================
// RENDER
// ==========================
function render(){
  if(state.role===null)return renderRoleSelect();
  if(state.role==='teacher')return renderTeacher();
  if(state.role==='student')return renderStudent();
}

// ---- ROLE SELECT ----
function renderRoleSelect(){
  app.innerHTML=`<div class="app-header"><h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1><p>Learn Punjabi — Interactive Flashcards & Quizzes</p></div>
  <div class="role-cards">
    <div class="role-card" onclick="showTeacherLogin()"><div class="icon">👩‍🏫</div><h3>Teacher</h3><p>Manage cards & students</p></div>
    <div class="role-card" onclick="showStudentLogin()"><div class="icon">🧑‍🎓</div><h3>Student</h3><p>Practice & quizzes</p></div>
  </div>`;
}

// ---- TEACHER LOGIN ----
function showTeacherLogin(){
  app.innerHTML=`<div class="app-header"><h1>👩‍🏫 Teacher Login</h1></div>
  <div class="panel"><div class="field"><label class="label">Password</label>
  <input class="input" type="password" id="teacherPw" placeholder="Enter teacher password" onkeydown="if(event.key==='Enter')loginTeacher()"></div>
  <button class="btn btn-primary btn-full" onclick="loginTeacher()">Login</button></div>
  <button class="back-btn" onclick="state.role=null;render()">← Back</button>`;
}
function loginTeacher(){if($('teacherPw').value===TEACHER_PASSWORD){state.role='teacher';state.tab='cards';initTeacher()}else toast('Wrong password','error')}

// ---- STUDENT LOGIN ----
function showStudentLogin(){
  app.innerHTML=`<div class="app-header"><h1>🧑‍🎓 Student Login</h1><p>ਆਪਣਾ ਯੂਜ਼ਰਨੇਮ ਅਤੇ ਪਾਸਵਰਡ ਦੱਸੋ</p></div>
  <div class="panel">
    <div class="field"><label class="label">Username</label><input class="input" id="stuUser" placeholder="Enter username"></div>
    <div class="field"><label class="label">Password</label><input class="input" type="password" id="stuPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')loginStudent()"></div>
    <button class="btn btn-primary btn-full" id="stuLoginBtn" onclick="loginStudent()">Login ✨</button>
  </div>
  <button class="back-btn" onclick="state.role=null;render()">← Back</button>`;
}

async function loginStudent(){
  const user=$('stuUser').value.trim().toLowerCase();
  const pass=$('stuPass').value.trim();
  if(!user||!pass)return toast('Enter username and password','error');
  $('stuLoginBtn').disabled=true;$('stuLoginBtn').textContent='Logging in...';
  try{
    const snap=await db.collection('students').where('username','==',user).get();
    if(snap.empty){toast('Username not found. Contact your teacher.','error');$('stuLoginBtn').disabled=false;$('stuLoginBtn').textContent='Login ✨';return}
    const doc=snap.docs[0];const data=doc.data();
    if(data.password!==pass){toast('Wrong password','error');$('stuLoginBtn').disabled=false;$('stuLoginBtn').textContent='Login ✨';return}
    state.studentId=doc.id;state.studentName=data.name||data.username;state.role='student';state.view='home';
    await db.collection('students').doc(doc.id).update({lastSeen:Date.now()});
    await loadCategories();
    state.unreadCount=await getUnreadCount(state.studentId);
    render();
  }catch(e){toast('Login error: '+e.message,'error');$('stuLoginBtn').disabled=false;$('stuLoginBtn').textContent='Login ✨'}
}

// ==========================
// TEACHER
// ==========================
async function initTeacher(){
  app.innerHTML='<div class="loading-screen"><div class="loader"></div><p>Loading dashboard...</p></div>';
  await loadCategories();await loadAllCards();await loadStudents();
  state.teacherUnread=await getTeacherUnreadPerStudent();
  state.teacherTotalUnread=Object.values(state.teacherUnread||{}).reduce((a,b)=>a+b,0);
  renderTeacher();
}

function renderTeacher(){
  const mu=state.teacherTotalUnread||0;
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:18px;font-weight:800">👩‍🏫 Teacher Panel</div>
    <button class="btn btn-sm btn-secondary" onclick="state.role=null;render()">Logout</button></div>
  <div class="tabs">
    <button class="tab ${state.tab==='cards'?'active':''}" onclick="state.tab='cards';render()">📚 Cards</button>
    <button class="tab ${state.tab==='categories'?'active':''}" onclick="state.tab='categories';render()">📁 Categories</button>
    <button class="tab ${state.tab==='students'?'active':''}" onclick="state.tab='students';render()">👥 Students</button>
    <button class="tab ${state.tab==='messages'?'active':''}" onclick="state.tab='messages';render()">💬 Msgs${mu?'<span class="msg-badge">'+mu+'</span>':''}</button>
    <button class="tab ${state.tab==='quizGroups'?'active':''}" onclick="state.tab='quizGroups';render()">🎮 Quiz</button>
  </div>`;
  if(state.tab==='cards')h+=renderTeacherCards();
  if(state.tab==='categories')h+=renderTeacherCategories();
  if(state.tab==='students')h+=renderTeacherStudents();
  if(state.tab==='messages')h+=renderTeacherMessages();
  if(state.tab==='quizGroups')h+=renderTeacherQuizGroups();
  app.innerHTML=h;
}

// ---- Categories ----
function renderTeacherCategories(){
  let h=`<div class="panel"><div class="panel-title">📁 Categories</div>
  <div class="field"><div style="display:flex;gap:8px">
    <input class="input" id="newCatName" placeholder="English name"><input class="input" id="newCatGurmukhi" placeholder="ਗੁਰਮੁਖੀ" style="max-width:120px">
    <button class="btn btn-primary btn-sm" onclick="addCategory()">+</button></div></div>`;
  if(!state.categories.length)h+='<div class="empty"><div class="icon">📁</div><p>No categories yet</p></div>';
  else state.categories.forEach(c=>{
    const count=state.cards.filter(x=>x.categoryId===c.id).length;
    h+=`<div class="card-item"><div style="font-size:24px">${c.emoji||'📚'}</div><div class="card-text"><h4>${c.name}</h4><p>${c.gurmukhi||''} · ${count} cards</p></div>
    <button class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}')">🗑</button></div>`;
  });
  return h+'</div>';
}
async function addCategory(){const n=$('newCatName').value.trim(),g=$('newCatGurmukhi').value.trim();if(!n)return toast('Enter name','error');await db.collection('categories').add({name:n,gurmukhi:g,emoji:'📚',createdAt:Date.now()});await loadCategories();toast('Category added!');renderTeacher()}
async function deleteCategory(id){if(!confirm('Delete category and all its cards?'))return;const s=await db.collection('cards').where('categoryId','==',id).get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));b.delete(db.collection('categories').doc(id));await b.commit();await loadCategories();await loadAllCards();toast('Deleted');renderTeacher()}

// ---- Cards ----
function renderTeacherCards(){
  let h=`<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="panel-title" style="margin:0">📚 Cards</div><button class="btn btn-primary btn-sm" onclick="showAddCard()">+ Add Card</button></div>`;
  h+='<div class="chips"><div class="chip '+(state.selectedCat===null?'active':'')+'" onclick="state.selectedCat=null;filterCards()">All</div>';
  state.categories.forEach(c=>{h+=`<div class="chip ${state.selectedCat===c.id?'active':''}" onclick="state.selectedCat='${c.id}';filterCards()">${c.name}</div>`});
  h+='</div>';
  const filtered=state.selectedCat?state.cards.filter(c=>c.categoryId===state.selectedCat):state.cards;
  if(!filtered.length)h+='<div class="empty"><div class="icon">🃏</div><p>No cards yet</p></div>';
  else filtered.forEach(c=>{
    const cat=state.categories.find(x=>x.id===c.categoryId);
    h+=`<div class="card-item">${c.imageUrl?`<img class="card-thumb" src="${c.imageUrl}">`:'<div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">🖼</div>'}
    <div class="card-text"><h4>${c.gurmukhi}</h4><p>${c.english} · ${cat?cat.name:'?'}</p></div>
    <div style="display:flex;gap:4px">${c.audioUrl?`<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();playAudio('${c.audioUrl}')">🔊</button>`:''}
    <button class="btn btn-sm btn-danger" onclick="deleteCard('${c.id}')">🗑</button></div></div>`;
  });
  return h+'</div>';
}
async function filterCards(){if(state.selectedCat)await loadCards(state.selectedCat);else await loadAllCards();renderTeacher()}
async function deleteCard(id){if(!confirm('Delete?'))return;await db.collection('cards').doc(id).delete();await loadAllCards();toast('Deleted');renderTeacher()}

function showAddCard(){
  recordedBlob=null;
  let h=`<button class="back-btn" onclick="state.tab='cards';renderTeacher()">← Back to Cards</button>
  <div class="panel"><div class="panel-title">✏️ Add New Card</div>
  <div class="field"><label class="label">Category</label><select class="input" id="cardCat">`;
  state.categories.forEach(c=>{h+=`<option value="${c.id}">${c.name} (${c.gurmukhi||''})</option>`});
  h+=`</select></div>
  <div class="field"><label class="label">Gurmukhi Text</label><input class="input" id="cardGurmukhi" placeholder="e.g. ਸੇਬ" style="font-size:20px"></div>
  <div class="field"><label class="label">English Translation</label><input class="input" id="cardEnglish" placeholder="e.g. Apple"></div>
  <div class="field"><label class="label">Picture</label>
    <div class="upload-area" id="imgUploadArea" onclick="$('imgFileInput').click()"><div class="icon">📸</div><p>Tap to upload picture</p></div>
    <input type="file" accept="image/*" id="imgFileInput" style="display:none" onchange="previewImage(this)"><div id="imgPreview"></div></div>
  <div class="field"><label class="label">Audio</label>
    <div class="record-row"><button class="rec-btn btn-secondary" id="recBtn" onclick="toggleRecording()" style="background:var(--red)">🎙</button>
    <div id="audioStatus" style="flex:1;font-size:12px;color:var(--muted)">Tap 🎙 to record or upload ↓</div></div>
    <div style="margin-top:8px"><input type="file" accept="audio/*" id="audioFileInput" onchange="previewAudioFile(this)" style="font-size:12px;color:var(--muted)"></div>
    <div id="audioPreview" style="margin-top:8px"></div></div>
  <button class="btn btn-primary btn-full" id="saveCardBtn" onclick="saveCard()">💾 Save Card</button></div>`;
  app.innerHTML=h;
}

function previewImage(input){if(input.files&&input.files[0]){const r=new FileReader();r.onload=e=>{$('imgPreview').innerHTML=`<img class="preview-img" src="${e.target.result}">`;$('imgUploadArea').classList.add('has-file');$('imgUploadArea').innerHTML='<div class="icon">✅</div><p>Picture selected</p>'};r.readAsDataURL(input.files[0])}}

async function toggleRecording(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();$('recBtn').style.background='var(--red)';$('recBtn').classList.remove('recording');$('recBtn').innerHTML='🎙';$('audioStatus').textContent='Processing...';return}
  try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});audioChunks=[];mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=()=>{recordedBlob=new Blob(audioChunks,{type:'audio/webm'});stream.getTracks().forEach(t=>t.stop());const url=URL.createObjectURL(recordedBlob);$('audioPreview').innerHTML=`<audio controls src="${url}" style="width:100%;height:36px"></audio>`;$('audioStatus').textContent='✅ Audio recorded!'};
    mediaRecorder.start();$('recBtn').classList.add('recording');$('recBtn').innerHTML='⏹';$('audioStatus').textContent='Recording... tap ⏹ to stop'}
  catch(e){toast('Cannot access microphone','error')}
}
function previewAudioFile(input){if(input.files&&input.files[0]){recordedBlob=input.files[0];const url=URL.createObjectURL(recordedBlob);$('audioPreview').innerHTML=`<audio controls src="${url}" style="width:100%;height:36px"></audio>`;$('audioStatus').textContent='✅ Audio loaded!'}}

async function saveCard(){
  const cat=$('cardCat').value,gurmukhi=$('cardGurmukhi').value.trim(),english=$('cardEnglish').value.trim(),imgFile=$('imgFileInput').files[0];
  if(!gurmukhi||!english)return toast('Enter Gurmukhi and English','error');
  if(!cat)return toast('Select category','error');
  const btn=$('saveCardBtn');btn.disabled=true;
  try{
    let imageUrl='',audioUrl='';
    if(imgFile){btn.textContent='📸 Compressing image...';imageUrl=await compressImage(imgFile,400,0.7)}
    if(recordedBlob){btn.textContent='🔊 Processing audio...';audioUrl=await blobToBase64(recordedBlob)}
    btn.textContent='💾 Saving...';
    await db.collection('cards').add({categoryId:cat,gurmukhi,english,imageUrl,audioUrl,createdAt:Date.now()});
    recordedBlob=null;toast('Card saved! ✨');await loadAllCards();state.tab='cards';renderTeacher();
  }catch(e){console.error(e);toast('Error: '+e.message,'error');btn.disabled=false;btn.textContent='💾 Save Card'}
}

function showAddStudent(){
  app.innerHTML=`<button class="back-btn" onclick="renderTeacher()">← Back</button>
  <div class="panel"><div class="panel-title">➕ Add New Student</div>
  <div class="field"><label class="label">Full Name</label><input class="input" id="newStuName" placeholder="e.g. Harpreet Kaur"></div>

  <div class="field"><label class="label">Password</label><input class="input" id="newStuPass" placeholder="e.g. punjabi1"></div>
  <button class="btn btn-primary btn-full" onclick="addStudent()">✅ Create Student Account</button></div>`;
}

async function addStudent(){
  const name=$('newStuName').value.trim(),username=$('newStuUser').value.trim().toLowerCase(),password=$('newStuPass').value.trim();
  if(!name||!username||!password)return toast('Fill all fields','error');
  if(password.length<4)return toast('Password must be at least 4 characters','error');
  // Check if username already exists
  const existing=await db.collection('students').where('username','==',username).get();
  if(!existing.empty)return toast('Username already taken!','error');
  await db.collection('students').add({name,username,password,createdAt:Date.now(),lastSeen:null});
  await loadStudents();toast('Student account created! ✨');renderTeacher();
}

async function showStudentDetail(sid){
  app.innerHTML='<div class="loading-screen"><div class="loader"></div><p>Loading student data...</p></div>';
  try{
    const student=state.students.find(s=>s.id===sid);
    const actSnap=await db.collection('activity').where('studentId','==',sid).get();
    const activities=actSnap.docs.map(d=>d.data());activities.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
    const quizzes=activities.filter(a=>a.type==='quiz_complete'),practices=activities.filter(a=>a.type==='practice');
    const totalScore=quizzes.reduce((s,q)=>s+(q.score||0),0),totalQ=quizzes.reduce((s,q)=>s+(q.total||0),0);
    const totalTime=activities.reduce((s,a)=>s+(a.timeSpent||0),0),accuracy=totalQ>0?Math.round(totalScore/totalQ*100):0;

    let h=`<button class="back-btn" onclick="renderTeacher()">← Back</button>
    <div class="app-header" style="padding:12px 0"><h1>${student.name||student.username}</h1><p>@${student.username} · Joined ${new Date(student.createdAt||0).toLocaleDateString()}</p></div>
    <div class="score-bar">
      <div class="score-item"><div class="score-num" style="color:var(--saffron)">${quizzes.length}</div><div class="score-label">Quizzes</div></div>
      <div class="score-item"><div class="score-num" style="color:var(--green)">${accuracy}%</div><div class="score-label">Accuracy</div></div>
      <div class="score-item"><div class="score-num" style="color:var(--blue)">${practices.length}</div><div class="score-label">Practiced</div></div>
      <div class="score-item"><div class="score-num" style="color:var(--purple)">${Math.round(totalTime/60)}m</div><div class="score-label">Time</div></div>
    </div>`;

    // Quick message button
    h+=`<button class="btn btn-primary btn-full" style="margin-bottom:12px" onclick="openTeacherChat('${sid}','${(student.name||student.username).replace(/'/g,"\\'")}')">💬 Send Message</button>`;

    // Reset password
    h+=`<div class="panel"><div class="panel-title">⚙️ Account</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input class="input" id="resetPw" placeholder="New password" style="flex:1">
      <button class="btn btn-sm btn-secondary" onclick="resetStudentPassword('${sid}')">Reset</button>
    </div>
    <button class="btn btn-sm btn-danger" style="margin-top:10px;width:100%" onclick="deleteStudent('${sid}')">🗑 Delete Student</button></div>`;

    h+=`<div class="panel"><div class="panel-title">📊 Recent Activity</div>`;
    if(!activities.length)h+='<div class="empty"><p>No activity yet</p></div>';
    else activities.slice(0,20).forEach(a=>{
      const time=fmtTime(a.timestamp);
      if(a.type==='quiz_complete')h+=`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--saffron)">🎮 Quiz</span> — ${a.score}/${a.total} (${Math.round(a.score/a.total*100)}%)<div style="font-size:11px;color:var(--muted)">${time}</div></div>`;
      else if(a.type==='practice')h+=`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--blue)">📚 Practice</span> — ${a.categoryName||'Cards'}: ${a.cardsViewed||0} cards<div style="font-size:11px;color:var(--muted)">${time}</div></div>`;
    });
    h+='</div>';app.innerHTML=h;
  }catch(e){console.error(e);app.innerHTML=`<button class="back-btn" onclick="renderTeacher()">← Back</button><div class="panel"><p style="color:var(--red)">${e.message}</p></div>`}
}

async function resetStudentPassword(sid){
  const pw=$('resetPw').value.trim();if(!pw||pw.length<4)return toast('Min 4 characters','error');
  await db.collection('students').doc(sid).update({password:pw});toast('Password reset! ✅')
}
async function deleteStudent(sid){
  if(!confirm('Delete this student and all their data?'))return;
  await db.collection('students').doc(sid).delete();await loadStudents();toast('Student deleted');renderTeacher()
}

// ---- Teacher Messages ----
function renderTeacherMessages(){
  let h=`<div class="panel"><div class="panel-title">💬 Messages</div>`;
  if(!state.students.length){h+='<div class="empty"><p>Add students first to send messages</p></div>';return h+'</div>'}
  // Broadcast
  h+=`<div class="card-item" style="cursor:pointer;border:1px solid var(--saffron)33" onclick="openTeacherBroadcast()">
    <div style="font-size:24px">📢</div><div class="card-text"><h4>Send to All Students</h4><p>Broadcast a message</p></div></div>`;
  // Per student
  const unread=state.teacherUnread||{};
  state.students.forEach(s=>{
    const i=(s.name||s.username||'?')[0].toUpperCase();
    const u=unread[s.id]||0;
    h+=`<div class="student-row" style="cursor:pointer" onclick="openTeacherChat('${s.id}','${(s.name||s.username).replace(/'/g,"\\'")}')">
      <div class="student-avatar">${i}</div>
      <div class="student-info"><div class="student-name">${s.name||s.username}${u?'<span class="msg-badge">'+u+'</span>':''}</div>
      <div class="student-stat">@${s.username}</div></div>
      <div style="color:var(--muted);font-size:18px">›</div></div>`;
  });
  return h+'</div>';
}

async function openTeacherChat(sid,sname){
  app.innerHTML='<div class="loading-screen"><div class="loader"></div><p>Loading messages...</p></div>';
  await markAsRead('teacher',sid);
  state.teacherUnread=await getTeacherUnreadPerStudent();
  state.teacherTotalUnread=Object.values(state.teacherUnread||{}).reduce((a,b)=>a+b,0);
  const msgs=await getMessages('teacher',sid);
  let h=`<button class="back-btn" onclick="renderTeacher()">← Back</button>
  <div class="panel"><div class="panel-title">💬 ${sname}</div><div class="msg-list" id="msgList">`;
  if(!msgs.length)h+='<div class="empty"><p>No messages yet. Say hello!</p></div>';
  else msgs.forEach(m=>{
    const sent=m.fromId==='teacher';
    h+=`<div class="msg-bubble ${sent?'msg-sent':'msg-received'}">${!sent?'<div class="msg-sender">'+m.fromName+'</div>':''}${m.text}<div class="msg-time">${fmtTime(m.timestamp)}</div></div>`;
  });
  h+=`</div><div class="msg-compose"><input class="input" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendTeacherMsg('${sid}','${sname.replace(/'/g,"\\'")}')">
  <button class="btn btn-primary btn-sm" onclick="sendTeacherMsg('${sid}','${sname.replace(/'/g,"\\'")}')">Send</button></div></div>`;
  app.innerHTML=h;
  const list=$('msgList');if(list)list.scrollTop=list.scrollHeight;
}

async function sendTeacherMsg(sid,sname){
  const text=$('msgInput').value.trim();if(!text)return;
  $('msgInput').value='';
  await sendMessage('teacher','Teacher',sid,sname,text);
  openTeacherChat(sid,sname);
}

async function openTeacherBroadcast(){
  app.innerHTML=`<button class="back-btn" onclick="renderTeacher()">← Back</button>
  <div class="panel"><div class="panel-title">📢 Broadcast to All Students</div>
  <div class="field"><label class="label">Message</label><textarea class="input" id="broadcastMsg" rows="3" placeholder="Type your message to all students..."></textarea></div>
  <button class="btn btn-primary btn-full" id="broadcastBtn" onclick="sendBroadcast()">📢 Send to All</button></div>`;
}

async function sendBroadcast(){
  const text=$('broadcastMsg').value.trim();if(!text)return toast('Enter a message','error');
  $('broadcastBtn').disabled=true;$('broadcastBtn').textContent='Sending...';
  for(const s of state.students){await sendMessage('teacher','Teacher',s.id,s.name||s.username,text)}
  toast('Message sent to all students! ✨');renderTeacher();
}

async function loadQuizGroups(){

  if(!groups.length){el.innerHTML='<div class="empty"><div class="icon">🎮</div><p>No quiz groups. App will use random cards.</p></div>';return}
  let h='';groups.forEach(g=>{const cat=state.categories.find(c=>c.id===g.categoryId);
    h+=`<div class="card-item"><div style="font-size:24px">🎮</div><div class="card-text"><h4>${g.name||'Quiz'}</h4><p>${cat?cat.name:'?'} · ${(g.cardIds||[]).length} cards</p></div>
    <button class="btn btn-sm btn-danger" onclick="deleteQG('${g.id}')">🗑</button></div>`});
  el.innerHTML=h;

async function deleteQG(id){if(!confirm('Delete?'))return;await db.collection('quizGroups').doc(id).delete();toast('Deleted');renderTeacher()}

function showAddQuizGroup(){
  let opts=state.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  app.innerHTML=`<button class="back-btn" onclick="renderTeacher()">← Back</button>
  <div class="panel"><div class="panel-title">🎮 Create Quiz Group</div>
  <div class="field"><label class="label">Name</label><input class="input" id="qgName" placeholder="e.g. Fruits Quiz"></div>
  <div class="field"><label class="label">Category</label><select class="input" id="qgCat" onchange="loadQGCards()">${opts}</select></div>
  <div class="field"><label class="label">Select 4 Cards</label><div id="qgCards"></div></div>
  <button class="btn btn-primary btn-full" onclick="saveQG()">💾 Save</button></div>`;
  setTimeout(loadQGCards,0);
}
async function loadQGCards(){
  const snap=await db.collection('cards').where('categoryId','==',$('qgCat').value).get();
  const cards=snap.docs.map(d=>({id:d.id,...d.data()}));let h='';
  if(cards.length<4)h='<p style="color:var(--red);font-size:12px">Need at least 4 cards</p>';
  else cards.forEach(c=>{h+=`<label style="display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer">
    <input type="checkbox" class="qg-check" value="${c.id}" style="width:18px;height:18px">
    ${c.imageUrl?`<img src="${c.imageUrl}" style="width:36px;height:36px;border-radius:6px;object-fit:cover">`:''}
    <span style="font-size:14px"><strong>${c.gurmukhi}</strong> — ${c.english}</span></label>`});
  $('qgCards').innerHTML=h;
}
async function saveQG(){
  const name=$('qgName').value.trim(),catId=$('qgCat').value;
  const ids=[...document.querySelectorAll('.qg-check:checked')].map(c=>c.value);
  if(ids.length!==4)return toast('Select exactly 4 cards','error');if(!name)return toast('Enter name','error');
  await db.collection('quizGroups').add({name,categoryId:catId,cardIds:ids,createdAt:Date.now()});
  toast('Created! ✨');state.tab='quizGroups';renderTeacher();
}

  });
  h+=`</div><div class="msg-compose"><input class="input" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendStudentMsg()">
  <button class="btn btn-primary btn-sm" onclick="sendStudentMsg()">Send</button></div></div>`;
  app.innerHTML=h;
  const list=$('msgList');if(list)list.scrollTop=list.scrollHeight;
}

async function sendStudentMsg(){
  const text=$('msgInput').value.trim();if(!text)return;
  $('msgInput').value='';
  await sendMessage(state.studentId,state.studentName,'teacher','Teacher',text);
  renderStudentMessages();
}

// ---- Practice ----
async function startPractice(catId,catName){
  app.innerHTML='<div class="loading-screen"><div class="loader"></div><p>Loading cards...</p></div>';
  await loadCards(catId);if(!state.cards.length){toast('No cards yet','error');renderStudent();return}
  state.flashCards=shuffleArray(state.cards);state.flashIndex=0;state.flashRevealed=false;
  state.view='practice';state.practiceStart=Date.now();state.practiceCat=catName;state.practiceCardsViewed=0;render();
}

function renderStudentPractice(){
  const cards=state.flashCards,card=cards[state.flashIndex];
  if(!card){state.view='home';render();return}
  let h=`<button class="back-btn" onclick="endPractice()">← Back</button>
  <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:8px">${state.flashIndex+1} / ${cards.length}</div>
  <div class="flashcard">${card.imageUrl?`<img class="flashcard-img" src="${card.imageUrl}">`:'<div class="flashcard-img" style="display:flex;align-items:center;justify-content:center;font-size:60px">🖼</div>'}
  <div class="flashcard-body">`;
  if(state.flashRevealed){
    h+=`<div class="flashcard-gurmukhi">${card.gurmukhi}</div><div class="flashcard-english">${card.english}</div>`;
    if(card.audioUrl)h+=`<div style="margin-top:12px"><button class="audio-btn" onclick="playAudio('${card.audioUrl}')">🔊</button></div>`;
  }else h+='<div class="flashcard-gurmukhi flashcard-hidden">ਅੱਖਰ</div><div class="flashcard-english flashcard-hidden">Hidden</div>';
  h+='</div></div>';
  if(!state.flashRevealed)h+=`<button class="btn btn-primary btn-full" onclick="state.flashRevealed=true;state.practiceCardsViewed++;render()" style="margin-bottom:8px">👀 Reveal</button>`;
  else{h+='<div style="display:flex;gap:8px">';
    if(state.flashIndex>0)h+=`<button class="btn btn-secondary" style="flex:1" onclick="state.flashIndex--;state.flashRevealed=false;render()">← Prev</button>`;
    h+=state.flashIndex<cards.length-1?`<button class="btn btn-primary" style="flex:1" onclick="state.flashIndex++;state.flashRevealed=false;render()">Next →</button>`
      :`<button class="btn btn-primary" style="flex:1" onclick="endPractice()">✅ Done</button>`;
    h+='</div>'}
  app.innerHTML=h;
}

async function endPractice(){
  const time=Math.round((Date.now()-state.practiceStart)/1000);
  await recordStudentActivity('practice',{categoryName:state.practiceCat,cardsViewed:state.practiceCardsViewed,timeSpent:time});
  state.view='home';await loadCategories();render();
}

// ---- Quiz ----
async function startQuiz(catId,catName){
  app.innerHTML='<div class="loading-screen"><div class="loader"></div><p>Loading quiz...</p></div>';
  const qgSnap=await db.collection('quizGroups').where('categoryId','==',catId).get();
  const groups=qgSnap.docs.map(d=>({id:d.id,...d.data()}));
  await loadCards(catId);
  if(state.cards.length<4){toast('Need 4+ cards for quiz','error');state.view='home';render();return}
  let rounds=[];
  for(const g of groups){const gc=g.cardIds.map(id=>state.cards.find(c=>c.id===id)).filter(Boolean);
    if(gc.length===4){const correct=gc[Math.floor(Math.random()*4)];rounds.push({cards:shuffleArray(gc),correctId:correct.id,audioUrl:correct.audioUrl,gurmukhi:correct.gurmukhi})}}
  let attempts=0;
  while(rounds.length<5&&attempts<50){attempts++;const pick=shuffleArray(state.cards).slice(0,4);
    if(pick.length<4||!pick.every(c=>c.imageUrl))continue;
    const wa=pick.filter(c=>c.audioUrl);if(!wa.length)continue;
    const correct=wa[Math.floor(Math.random()*wa.length)];
    rounds.push({cards:shuffleArray(pick),correctId:correct.id,audioUrl:correct.audioUrl,gurmukhi:correct.gurmukhi})}
  if(!rounds.length){toast('Not enough cards with images & audio','error');state.view='home';render();return}
  state.quizCards=shuffleArray(rounds);state.quizIndex=0;state.quizScore=0;
  state.quizTotal=state.quizCards.length;state.quizStartTime=Date.now();state.quizAnswered=false;state.quizCatName=catName;state.view='quiz';render();
}

function renderStudentQuiz(){
  if(state.quizIndex>=state.quizCards.length){showQuizResult();return}
  const round=state.quizCards[state.quizIndex];
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="back-btn" style="margin:0" onclick="state.view='home';render()">✕</button>
    <div style="font-size:13px;color:var(--muted)">${state.quizIndex+1}/${state.quizTotal}</div>
    <div style="font-size:16px;font-weight:800;color:var(--saffron)">⭐ ${state.quizScore}</div></div>
  <div style="text-align:center;margin-bottom:16px">
    <div style="font-size:14px;color:var(--muted);margin-bottom:10px">Listen and tap the correct picture</div>
    <button class="audio-btn" onclick="playAudio('${round.audioUrl}')" style="width:64px;height:64px;font-size:28px">🔊</button>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Tap to hear</div></div>
  <div class="quiz-grid">`;
  round.cards.forEach(c=>{h+=`<div class="quiz-pic-wrap" id="qp_${c.id}" onclick="answerQuiz('${c.id}')"><img src="${c.imageUrl}" alt=""></div>`});
  h+='</div>';app.innerHTML=h;
}

function answerQuiz(cid){
  if(state.quizAnswered)return;state.quizAnswered=true;
  const round=state.quizCards[state.quizIndex],correct=cid===round.correctId;
  const el=$('qp_'+cid);
  if(correct){el.classList.add('correct');state.quizScore++;showFlash('correct')}
  else{el.classList.add('wrong');const ce=$('qp_'+round.correctId);if(ce)ce.classList.add('correct');showFlash('wrong')}
  playAudio(round.audioUrl);
  const btn=document.createElement('button');btn.className='btn btn-primary btn-full';btn.style.marginTop='12px';
  btn.textContent=state.quizIndex<state.quizTotal-1?'Next Round →':'See Results 🎉';
  btn.onclick=()=>{state.quizIndex++;state.quizAnswered=false;state.quizIndex>=state.quizCards.length?showQuizResult():render()};
  app.querySelector('.quiz-grid').after(btn);
}

function showFlash(type){const o=document.createElement('div');o.className='flash-overlay flash-'+type;o.innerHTML=`<span>${type==='correct'?'✅':'❌'}</span>`;document.body.appendChild(o);setTimeout(()=>o.remove(),500)}

async function showQuizResult(){
  const time=Math.round((Date.now()-state.quizStartTime)/1000),pct=Math.round(state.quizScore/state.quizTotal*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='ਬਹੁਤ ਵਧੀਆ! Amazing!'}else if(pct>=70){emoji='🌟';msg='ਸ਼ਾਬਾਸ਼! Great!'}
  else if(pct>=50){emoji='💪';msg='Good effort!'}else{emoji='📚';msg="Keep learning!"}
  await recordStudentActivity('quiz_complete',{categoryName:state.quizCatName,score:state.quizScore,total:state.quizTotal,timeSpent:time});
  app.innerHTML=`<div style="text-align:center;padding:40px 0">
    <div style="font-size:80px;margin-bottom:16px">${emoji}</div><h2 style="font-size:24px;margin-bottom:8px">${msg}</h2>
    <div style="font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${state.quizScore}/${state.quizTotal}</div>
    <div style="font-size:14px;color:var(--muted);margin-top:8px">${pct}% · ${Math.round(time/60)} min</div></div>
  <div style="display:flex;gap:10px;margin-top:20px">
    <button class="btn btn-secondary" style="flex:1" onclick="state.view='home';render()">🏠 Home</button>
    <button class="btn btn-primary" style="flex:1" onclick="startQuiz('${state.cards[0]?.categoryId}','${state.quizCatName}')">🔄 Retry</button></div>`;
}

// ---- INIT ----
async function init(){
  try{await db.collection('categories').limit(1).get();render()}
  catch(e){app.innerHTML=`<div class="app-header"><h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1></div>
  <div class="panel" style="text-align:center"><div style="font-size:40px;margin-bottom:12px">⚠️</div>
  <h3 style="margin-bottom:8px">Firebase Not Connected</h3><p style="color:var(--muted);font-size:13px">${e.message}</p></div>`}
}
init();
</script>
</body>
</html>
