<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1025">
<title>ਪੰਜਾਬੀ ਸਿੱਖੋ — Learn Punjabi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1025;color:#f0eef5;min-height:100vh;min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

:root{
  --saffron:#F5A623;--deep:#1a1025;--card:#241735;--card2:#2d1f42;
  --green:#34C759;--red:#FF3B5C;--blue:#5E8AFF;--purple:#9B6DFF;
  --text:#f0eef5;--muted:#8a7f9e;--border:#3a2d50;
}

/* Layout */
.container{max-width:440px;margin:0 auto;padding:12px;padding-top:max(12px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom))}
.hidden{display:none!important}

/* Header */
.app-header{text-align:center;padding:20px 0 16px}
.app-header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-header p{color:var(--muted);font-size:13px;margin-top:4px}

/* Buttons */
.btn{padding:12px 24px;border:none;border-radius:12px;font-weight:700;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:var(--saffron);color:#1a1025}
.btn-primary:hover{background:#f6b545}
.btn-secondary{background:var(--card2);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.4;cursor:default}

/* Inputs */
.input{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px}
.input:focus{outline:none;border-color:var(--saffron)}
.input::placeholder{color:var(--muted)}
.label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:14px}

/* Cards */
.panel{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
.panel-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Role Select */
.role-cards{display:flex;gap:12px;margin-top:20px}
.role-card{flex:1;background:var(--card);border:2px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--saffron);transform:translateY(-2px)}
.role-card .icon{font-size:40px;margin-bottom:8px}
.role-card h3{font-size:16px;margin-bottom:4px}
.role-card p{font-size:12px;color:var(--muted)}

/* Nav tabs */
.tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:10px 8px;border:none;border-radius:9px;font-size:12px;font-weight:700;background:transparent;color:var(--muted);white-space:nowrap;min-width:70px}
.tab.active{background:var(--saffron);color:#1a1025}

/* Category chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s}
.chip.active{background:var(--saffron);color:#1a1025;border-color:var(--saffron)}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Flashcard */
.flashcard{background:var(--card);border-radius:16px;overflow:hidden;min-height:300px;position:relative;margin-bottom:12px}
.flashcard-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--card2)}
.flashcard-body{padding:16px;text-align:center}
.flashcard-gurmukhi{font-size:32px;font-weight:800;margin-bottom:4px}
.flashcard-english{font-size:14px;color:var(--muted)}
.flashcard-hidden{filter:blur(20px);user-select:none}
.flashcard-reveal{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:2}
.audio-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--saffron);color:#1a1025;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 15px rgba(245,166,35,.3)}
.audio-btn:active{transform:scale(.95)}

/* Quiz */
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.quiz-pic{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;border:3px solid var(--border);cursor:pointer;transition:all .15s;display:block;background:var(--card2)}
.quiz-pic:active{transform:scale(.96)}
.quiz-pic.correct{border-color:var(--green);box-shadow:0 0 20px rgba(52,199,89,.4)}
.quiz-pic.wrong{border-color:var(--red);box-shadow:0 0 20px rgba(255,59,92,.4)}

/* Flash overlay */
.flash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:flashIn .4s ease-out forwards;pointer-events:none}
.flash-correct{background:rgba(52,199,89,.25)}
.flash-wrong{background:rgba(255,59,92,.25)}
.flash-overlay span{font-size:64px;animation:popIn .3s ease-out}
@keyframes flashIn{0%{opacity:1}100%{opacity:0}}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Score bar */
.score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin-bottom:12px}
.score-item{text-align:center}
.score-num{font-size:22px;font-weight:800}
.score-label{font-size:10px;color:var(--muted);text-transform:uppercase}

/* Student list */
.student-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.student-row:last-child{border-bottom:none}
.student-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.student-info{flex:1}
.student-name{font-weight:600;font-size:14px}
.student-stat{font-size:11px;color:var(--muted)}

/* Card list (admin) */
.card-item{display:flex;gap:10px;padding:10px;background:var(--card2);border-radius:10px;margin-bottom:8px;align-items:center}
.card-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card)}
.card-text{flex:1;min-width:0}
.card-text h4{font-size:14px;font-weight:600}
.card-text p{font-size:11px;color:var(--muted)}

/* Upload area */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:8px}
.upload-area:hover{border-color:var(--saffron)}
.upload-area.has-file{border-color:var(--green);border-style:solid}
.upload-area .icon{font-size:28px;margin-bottom:4px}
.upload-area p{font-size:12px;color:var(--muted)}
.preview-img{max-width:100%;max-height:150px;border-radius:8px;margin-top:8px}

/* Record */
.record-row{display:flex;gap:8px;align-items:center}
.rec-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:18px;display:flex;align-items:center;justify-content:center}
.rec-btn.recording{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,.4)}50%{box-shadow:0 0 0 10px rgba(255,59,92,0)}}
.audio-preview{flex:1;height:40px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}

/* Back btn */
.back-btn{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:8px 0;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}

/* Loading */
.loader{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loading-screen p{color:var(--muted);font-size:13px}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:40px;margin-bottom:8px}
.empty p{font-size:13px}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;animation:toastIn .3s ease-out}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Responsive images in quiz */
.quiz-pic-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;border:3px solid var(--border);cursor:pointer;transition:all .15s}
.quiz-pic-wrap:active{transform:scale(.96)}
.quiz-pic-wrap.correct{border-color:var(--green);box-shadow:0 0 20px rgba(52,199,89,.4)}
.quiz-pic-wrap.wrong{border-color:var(--red);box-shadow:0 0 20px rgba(255,59,92,.4)}
.quiz-pic-wrap img{width:100%;height:100%;object-fit:cover;display:block}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading-screen"><div class="loader"></div><p>Loading ਪੰਜਾਬੀ ਸਿੱਖੋ...</p></div>
</div>

<script>
// ============================================================
// 🔥 FIREBASE CONFIG — REPLACE WITH YOUR OWN
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAonCmVIp_vhP5vbRDjP7Nlx5PB8piwubE",
  authDomain: "pathshala-28752.firebaseapp.com",
  projectId: "pathshala-28752",
  storageBucket: "pathshala-28752.firebasestorage.app",
  messagingSenderId: "238955568068",
  appId: "1:238955568068:web:c89ebe8983c9888874a291"
};
// ============================================================

const TEACHER_PASSWORD = "punjabi123"; // Change this!

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const $ = id => document.getElementById(id);
const app = $('app');
let state = {
  role: null, // 'teacher' or 'student'
  studentName: '',
  studentId: '',
  view: 'home',
  tab: 'cards',
  selectedCat: null,
  quizCards: [],
  quizIndex: 0,
  quizScore: 0,
  quizTotal: 0,
  quizStartTime: 0,
  quizAnswered: false,
  flashIndex: 0,
  flashRevealed: false,
  flashCards: [],
  categories: [],
  cards: [],
  students: [],
  editingCard: null,
  loading: false
};

// ---- Helpers ----
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function timeSince(ts) {
  if (!ts) return 'Never';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'Just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---- Firebase Helpers ----
async function loadCategories() {
  const snap = await db.collection('categories').orderBy('name').get();
  state.categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function loadCards(catId) {
  let q = db.collection('cards');
  if (catId) q = q.where('categoryId', '==', catId);
  const snap = await q.get();
  state.cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function loadAllCards() {
  const snap = await db.collection('cards').get();
  state.cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function loadStudents() {
  const snap = await db.collection('students').get();
  state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function uploadFile(file, path) {
  try {
    const ref = storage.ref(path);
    const snapshot = await ref.put(file);
    const url = await snapshot.ref.getDownloadURL();
    return url;
  } catch(e) {
    console.error('Upload error:', e);
    if (e.code === 'storage/unauthorized') {
      throw new Error('Storage permission denied. Check Firebase Storage rules are in test mode.');
    } else if (e.code === 'storage/unknown') {
      throw new Error('Storage error. Make sure Firebase Storage is enabled in your console.');
    }
    throw e;
  }
}

async function recordStudentActivity(type, data) {
  if (state.role !== 'student' || !state.studentId) return;
  await db.collection('students').doc(state.studentId).update({ lastSeen: Date.now() });
  await db.collection('activity').add({
    studentId: state.studentId,
    studentName: state.studentName,
    type,
    ...data,
    timestamp: Date.now()
  });
}

// ---- Audio ----
let currentAudio = null;
function playAudio(url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (!url) return;
  currentAudio = new Audio(url);
  currentAudio.play().catch(e => console.log('Audio error:', e));
}

// ---- Media Recording ----
let mediaRecorder = null;
let audioChunks = [];
let recordedBlob = null;

// ---- RENDER ----
function render() {
  if (state.role === null) return renderRoleSelect();
  if (state.role === 'teacher') return renderTeacher();
  if (state.role === 'student') return renderStudent();
}

// ---- ROLE SELECT ----
function renderRoleSelect() {
  app.innerHTML = `
    <div class="app-header">
      <h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1>
      <p>Learn Punjabi — Interactive Flashcards & Quizzes</p>
    </div>
    <div class="role-cards">
      <div class="role-card" onclick="showTeacherLogin()">
        <div class="icon">👩‍🏫</div>
        <h3>Teacher</h3>
        <p>Manage cards & track students</p>
      </div>
      <div class="role-card" onclick="showStudentLogin()">
        <div class="icon">🧑‍🎓</div>
        <h3>Student</h3>
        <p>Practice & take quizzes</p>
      </div>
    </div>
  `;
}

function showTeacherLogin() {
  app.innerHTML = `
    <div class="app-header">
      <h1>👩‍🏫 Teacher Login</h1>
    </div>
    <div class="panel">
      <div class="field">
        <label class="label">Password</label>
        <input class="input" type="password" id="teacherPw" placeholder="Enter teacher password" onkeydown="if(event.key==='Enter')loginTeacher()">
      </div>
      <button class="btn btn-primary btn-full" onclick="loginTeacher()">Login</button>
    </div>
    <button class="back-btn" onclick="state.role=null;render()">← Back</button>
  `;
}

function loginTeacher() {
  const pw = $('teacherPw').value;
  if (pw === TEACHER_PASSWORD) {
    state.role = 'teacher';
    state.tab = 'cards';
    initTeacher();
  } else {
    toast('Wrong password', 'error');
  }
}

function showStudentLogin() {
  app.innerHTML = `
    <div class="app-header">
      <h1>🧑‍🎓 ਆਪਣਾ ਨਾਮ ਦੱਸੋ</h1>
      <p>Enter your name to start learning</p>
    </div>
    <div class="panel">
      <div class="field">
        <label class="label">Your Name</label>
        <input class="input" type="text" id="studentNameInput" placeholder="e.g. Harpreet" onkeydown="if(event.key==='Enter')loginStudent()">
      </div>
      <button class="btn btn-primary btn-full" onclick="loginStudent()">Start Learning ✨</button>
    </div>
    <button class="back-btn" onclick="state.role=null;render()">← Back</button>
  `;
}

async function loginStudent() {
  const name = $('studentNameInput').value.trim();
  if (!name) return toast('Please enter your name', 'error');
  state.studentName = name;
  state.role = 'student';
  // Find or create student
  const snap = await db.collection('students').where('name', '==', name).get();
  if (snap.empty) {
    const ref = await db.collection('students').add({ name, joinedAt: Date.now(), lastSeen: Date.now() });
    state.studentId = ref.id;
  } else {
    state.studentId = snap.docs[0].id;
    await db.collection('students').doc(state.studentId).update({ lastSeen: Date.now() });
  }
  state.view = 'home';
  await loadCategories();
  render();
}

// ==========================
// TEACHER
// ==========================
async function initTeacher() {
  app.innerHTML = '<div class="loading-screen"><div class="loader"></div><p>Loading dashboard...</p></div>';
  await loadCategories();
  await loadAllCards();
  await loadStudents();
  renderTeacher();
}

function renderTeacher() {
  let h = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800">👩‍🏫 Teacher Panel</div>
      <button class="btn btn-sm btn-secondary" onclick="state.role=null;render()">Logout</button>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='cards'?'active':''}" onclick="state.tab='cards';render()">📚 Cards</button>
      <button class="tab ${state.tab==='categories'?'active':''}" onclick="state.tab='categories';render()">📁 Categories</button>
      <button class="tab ${state.tab==='quizGroups'?'active':''}" onclick="state.tab='quizGroups';render()">🎮 Quiz Groups</button>
      <button class="tab ${state.tab==='students'?'active':''}" onclick="state.tab='students';render()">👥 Students</button>
    </div>
  `;
  if (state.tab === 'cards') h += renderTeacherCards();
  if (state.tab === 'categories') h += renderTeacherCategories();
  if (state.tab === 'quizGroups') h += renderTeacherQuizGroups();
  if (state.tab === 'students') h += renderTeacherStudents();
  app.innerHTML = h;
}

function renderTeacherCategories() {
  let h = `<div class="panel"><div class="panel-title">📁 Categories</div>`;
  h += `<div class="field"><div style="display:flex;gap:8px">
    <input class="input" id="newCatName" placeholder="Category name (English)">
    <input class="input" id="newCatGurmukhi" placeholder="ਗੁਰਮੁਖੀ" style="max-width:120px">
    <button class="btn btn-primary btn-sm" onclick="addCategory()">+</button>
  </div></div>`;
  if (state.categories.length === 0) {
    h += '<div class="empty"><div class="icon">📁</div><p>No categories yet</p></div>';
  } else {
    state.categories.forEach(c => {
      const count = state.cards.filter(card => card.categoryId === c.id).length;
      h += `<div class="card-item">
        <div style="font-size:24px">${c.emoji||'📚'}</div>
        <div class="card-text"><h4>${c.name}</h4><p>${c.gurmukhi||''} · ${count} cards</p></div>
        <button class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}')">🗑</button>
      </div>`;
    });
  }
  h += '</div>';
  return h;
}

async function addCategory() {
  const name = $('newCatName').value.trim();
  const gurmukhi = $('newCatGurmukhi').value.trim();
  if (!name) return toast('Enter a category name', 'error');
  await db.collection('categories').add({ name, gurmukhi, emoji: '📚', createdAt: Date.now() });
  await loadCategories();
  toast('Category added!');
  renderTeacher();
}

async function deleteCategory(id) {
  if (!confirm('Delete this category and all its cards?')) return;
  // Delete cards in category
  const snap = await db.collection('cards').where('categoryId', '==', id).get();
  const batch = db.batch();
  snap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(db.collection('categories').doc(id));
  await batch.commit();
  await loadCategories();
  await loadAllCards();
  toast('Category deleted');
  renderTeacher();
}

function renderTeacherCards() {
  let h = `<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="panel-title" style="margin:0">📚 Cards</div>
    <button class="btn btn-primary btn-sm" onclick="showAddCard()">+ Add Card</button>
  </div>`;
  // Filter by category
  h += '<div class="chips"><div class="chip '+(state.selectedCat===null?'active':'')+'" onclick="state.selectedCat=null;filterCards()">All</div>';
  state.categories.forEach(c => {
    h += `<div class="chip ${state.selectedCat===c.id?'active':''}" onclick="state.selectedCat='${c.id}';filterCards()">${c.name}</div>`;
  });
  h += '</div>';
  const filtered = state.selectedCat ? state.cards.filter(c => c.categoryId === state.selectedCat) : state.cards;
  if (filtered.length === 0) {

function previewImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      $('imgPreview').innerHTML = `<img class="preview-img" src="${e.target.result}">`;
      $('imgUploadArea').classList.add('has-file');
      $('imgUploadArea').innerHTML = '<div class="icon">✅</div><p>Picture selected (tap to change)</p>';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    $('recBtn').style.background = 'var(--red)';
    $('recBtn').classList.remove('recording');
    $('recBtn').innerHTML = '🎙';
    $('audioStatus').textContent = 'Processing...';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
      const url = URL.createObjectURL(recordedBlob);
      $('audioPreview').innerHTML = `<audio controls src="${url}" style="width:100%;height:36px"></audio>`;
      $('audioStatus').textContent = '✅ Audio recorded!';
    };
    mediaRecorder.start();
    $('recBtn').classList.add('recording');
    $('recBtn').innerHTML = '⏹';
    $('audioStatus').textContent = 'Recording... tap ⏹ to stop';
  } catch(e) {
    toast('Cannot access microphone', 'error');
  }
}

function previewAudioFile(input) {
  if (input.files && input.files[0]) {
    recordedBlob = input.files[0];
    const url = URL.createObjectURL(recordedBlob);
    $('audioPreview').innerHTML = `<audio controls src="${url}" style="width:100%;height:36px"></audio>`;
    $('audioStatus').textContent = '✅ Audio file loaded!';
  }
}

async function saveCard() {
  const cat = $('cardCat').value;
  const gurmukhi = $('cardGurmukhi').value.trim();
  const english = $('cardEnglish').value.trim();
  const imgFile = $('imgFileInput').files[0];
  if (!gurmukhi || !english) return toast('Enter Gurmukhi text and English translation', 'error');
  if (!cat) return toast('Select a category', 'error');

  const btn = $('saveCardBtn');
  btn.disabled = true;

  try {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    let imageUrl = '';
    let audioUrl = '';

    if (imgFile) {
      btn.textContent = '📸 Uploading image...';
      imageUrl = await uploadFile(imgFile, `images/${id}_${imgFile.name}`);
    }
    if (recordedBlob) {
      btn.textContent = '🔊 Uploading audio...';
      const ext = recordedBlob.type.includes('webm') ? 'webm' : 'mp3';
      audioUrl = await uploadFile(recordedBlob, `audio/${id}.${ext}`);
    }

    btn.textContent = '💾 Saving to database...';
    await db.collection('cards').add({
      categoryId: cat, gurmukhi, english, imageUrl, audioUrl, createdAt: Date.now()
    });

    recordedBlob = null;
    toast('Card saved! ✨');
    await loadAllCards();
    state.tab = 'cards';
    renderTeacher();
  } catch(e) {
    console.error('Save error:', e);
    toast('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '💾 Save Card';
    // Show detailed error below button
    let errDiv = $('saveError');
    if (!errDiv) {
      errDiv = document.createElement('div');
      errDiv.id = 'saveError';
      errDiv.style.cssText = 'margin-top:10px;padding:10px;background:#2a1020;border:1px solid var(--red);border-radius:8px;font-size:11px;color:#ff8a9e;word-break:break-all';
      btn.parentNode.appendChild(errDiv);
    }
    errDiv.innerHTML = '<strong>Error details:</strong><br>' + e.message + (e.code ? '<br>Code: '+e.code : '');
  }
}

async function showStudentDetail(sid) {
  app.innerHTML = '<div class="loading-screen"><div class="loader"></div><p>Loading student data...</p></div>';

  const actSnap = await db.collection('activity').where('studentId', '==', sid).orderBy('timestamp', 'desc').limit(50).get();

  const quizzes = activities.filter(a => a.type === 'quiz_complete');
  const practices = activities.filter(a => a.type === 'practice');
  const totalScore = quizzes.reduce((sum, q) => sum + (q.score||0), 0);
  const totalQ = quizzes.reduce((sum, q) => sum + (q.total||0), 0);
  const totalTime = activities.reduce((sum, a) => sum + (a.timeSpent||0), 0);
  const accuracy = totalQ > 0 ? Math.round((totalScore/totalQ)*100) : 0;

  let h = `<button class="back-btn" onclick="renderTeacher()">← Back</button>`;
  h += `<div class="app-header" style="padding:12px 0"><h1>${student.name}</h1><p>Joined ${new Date(student.joinedAt||0).toLocaleDateString()}</p></div>`;

    <div class="score-item"><div class="score-num" style="color:var(--purple)">${Math.round(totalTime/60)}m</div><div class="score-label">Time Spent</div></div>
  </div>`;
  h += `<div class="panel"><div class="panel-title">📊 Recent Activity</div>`;
  if (activities.length === 0) {
    h += '<div class="empty"><p>No activity yet</p></div>';
  } else {
    activities.slice(0, 20).forEach(a => {
      const d = new Date(a.timestamp);
      const time = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      if (a.type === 'quiz_complete') {
        h += `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--saffron)">🎮 Quiz</span> — Score: ${a.score}/${a.total} (${Math.round(a.score/a.total*100)}%)
          <div style="font-size:11px;color:var(--muted)">${time} · ${Math.round((a.timeSpent||0)/60)}min</div>

          <div style="font-size:11px;color:var(--muted)">${time} · ${Math.round((a.timeSpent||0)/60)}min</div>
        </div>`;
      }
    });
  }
  h += '</div>';
  app.innerHTML = h;
}

  }
  h += '<div class="flashcard-body">';

    h += `<div class="flashcard-english">${card.english}</div>`;

// --- Quiz ---
async function startQuiz(catId, catName) {
  app.innerHTML = '<div class="loading-screen"><div class="loader"></div><p>Loading quiz...</p></div>';

  // Check for manual quiz groups first
  const qgSnap = await db.collection('quizGroups').where('categoryId', '==', catId).get();
  const groups = qgSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  await loadCards(catId);
  if (state.cards.length < 4) { toast('Need at least 4 cards for a quiz', 'error'); state.view='home'; render(); return; }

  // Build quiz rounds
  let rounds = [];
  // Add manual groups
  for (const g of groups) {
    const groupCards = g.cardIds.map(id => state.cards.find(c => c.id === id)).filter(Boolean);
    if (groupCards.length === 4) {
      const correct = groupCards[Math.floor(Math.random() * 4)];
      rounds.push({ cards: shuffleArray(groupCards), correctId: correct.id, audioUrl: correct.audioUrl, gurmukhi: correct.gurmukhi });
    }
  }
  // Add random rounds to get at least 5 total (or as many as possible)
  const targetRounds = Math.max(5, rounds.length);
  let attempts = 0;
  while (rounds.length < targetRounds && attempts < 50) {
    attempts++;
    const shuffled = shuffleArray(state.cards);
    const pick = shuffled.slice(0, 4);
    if (pick.length < 4) break;
    // Must all have images
    if (!pick.every(c => c.imageUrl)) continue;
    // Must have at least one with audio
    const withAudio = pick.filter(c => c.audioUrl);
    if (withAudio.length === 0) continue;
    const correct = withAudio[Math.floor(Math.random() * withAudio.length)];
    rounds.push({ cards: shuffleArray(pick), correctId: correct.id, audioUrl: correct.audioUrl, gurmukhi: correct.gurmukhi });
  }

  if (rounds.length === 0) { toast('Not enough cards with images & audio for quiz', 'error'); state.view='home'; render(); return; }

  state.quizCards = shuffleArray(rounds);
  state.quizIndex = 0;
  state.quizScore = 0;
  state.quizTotal = state.quizCards.length;
  state.quizStartTime = Date.now();
  state.quizAnswered = false;
  state.quizCatName = catName;
  state.view = 'quiz';
  render();
}

function renderStudentQuiz() {
  if (state.quizIndex >= state.quizCards.length) { showQuizResult(); return; }
  const round = state.quizCards[state.quizIndex];

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="back-btn" style="margin:0" onclick="state.view='home';render()">✕</button>
    <div style="font-size:13px;color:var(--muted)">Round ${state.quizIndex+1}/${state.quizTotal}</div>
    <div style="font-size:16px;font-weight:800;color:var(--saffron)">⭐ ${state.quizScore}</div>
  </div>`;

  h += `<div style="text-align:center;margin-bottom:16px">
    <div style="font-size:14px;color:var(--muted);margin-bottom:10px">Listen and tap the correct picture</div>
    <button class="audio-btn" onclick="playAudio('${round.audioUrl}')" style="width:64px;height:64px;font-size:28px">🔊</button>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Tap to hear the word</div>
  </div>`;

  h += '<div class="quiz-grid">';
  round.cards.forEach(card => {
    const id = `qpic_${card.id}`;
    h += `<div class="quiz-pic-wrap" id="${id}" onclick="answerQuiz('${card.id}')">
      <img src="${card.imageUrl}" alt="">
    </div>`;
  });
  h += '</div>';

  if (state.quizAnswered) {
    h += `<button class="btn btn-primary btn-full" onclick="nextQuizRound()">Next Round →</button>`;
  }

  app.innerHTML = h;
}

function answerQuiz(cardId) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const round = state.quizCards[state.quizIndex];
  const correct = cardId === round.correctId;

  const el = $(`qpic_${cardId}`);
  if (correct) {
    el.classList.add('correct');
    state.quizScore++;
    showFlash('correct');
  } else {
    el.classList.add('wrong');
    // Also highlight correct
    const correctEl = $(`qpic_${round.correctId}`);
    if (correctEl) correctEl.classList.add('correct');
    showFlash('wrong');
  }

  // Auto-play audio
  playAudio(round.audioUrl);

  // Show next button
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-primary btn-full';
  nextBtn.style.marginTop = '12px';
  nextBtn.textContent = state.quizIndex < state.quizTotal - 1 ? 'Next Round →' : 'See Results 🎉';
  nextBtn.onclick = nextQuizRound;
  app.querySelector('.quiz-grid').after(nextBtn);
}

function showFlash(type) {
  const overlay = document.createElement('div');
  overlay.className = `flash-overlay flash-${type}`;
  overlay.innerHTML = `<span>${type==='correct'?'✅':'❌'}</span>`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 500);
}

function nextQuizRound() {
  state.quizIndex++;
  state.quizAnswered = false;
  if (state.quizIndex >= state.quizCards.length) {
    showQuizResult();
  } else {
    render();
  }
}

async function showQuizResult() {
  const time = Math.round((Date.now() - state.quizStartTime) / 1000);
  const pct = Math.round((state.quizScore / state.quizTotal) * 100);
  let emoji, message;
  if (pct >= 90) { emoji = '🏆'; message = 'ਬਹੁਤ ਵਧੀਆ! Amazing!'; }
  else if (pct >= 70) { emoji = '🌟'; message = 'ਸ਼ਾਬਾਸ਼! Great job!'; }
  else if (pct >= 50) { emoji = '💪'; message = 'Good effort, keep practicing!'; }
  else { emoji = '📚'; message = 'Keep learning, you\'ll get better!'; }

  await recordStudentActivity('quiz_complete', {
    categoryName: state.quizCatName,
    score: state.quizScore,
    total: state.quizTotal,
    timeSpent: time
  });

  app.innerHTML = `
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:80px;margin-bottom:16px">${emoji}</div>
      <h2 style="font-size:24px;margin-bottom:8px">${message}</h2>
      <div style="font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${state.quizScore}/${state.quizTotal}</div>
      <div style="font-size:14px;color:var(--muted);margin-top:8px">${pct}% accuracy · ${Math.round(time/60)} min</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-secondary" style="flex:1" onclick="state.view='home';render()">🏠 Home</button>
      <button class="btn btn-primary" style="flex:1" onclick="startQuiz('${state.cards[0]?.categoryId}','${state.quizCatName}')">🔄 Retry</button>
    </div>
  `;
}

// ---- INIT ----
async function init() {
  try {
    // Test Firebase connection
    await db.collection('categories').limit(1).get();
    render();
  } catch(e) {
    app.innerHTML = `
      <div class="app-header"><h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1></div>
      <div class="panel" style="text-align:center">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <h3 style="margin-bottom:8px">Firebase Not Connected</h3>
        <p style="color:var(--muted);font-size:13px;line-height:1.6">
          Open this HTML file and replace the Firebase config at the top of the script with your own project details.
          <br><br>See the setup guide or ask your developer for help.
        </p>
        <p style="color:var(--red);font-size:11px;margin-top:12px">${e.message}</p>
      </div>`;
  }
}

init();
</script>
</body>
</html>
