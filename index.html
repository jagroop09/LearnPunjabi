*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1025;color:#f0eef5;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit}
:root{--saf:#F5A623;--card:#241735;--card2:#2d1f42;--grn:#34C759;--red:#FF3B5C;--blu:#5E8AFF;--pur:#9B6DFF;--txt:#f0eef5;--mut:#8a7f9e;--brd:#3a2d50}
.ctn{max-width:440px;margin:0 auto;padding:12px;padding-top:max(12px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom))}
.hdr{text-align:center;padding:16px 0 12px}
.hdr h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--saf),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{color:var(--mut);font-size:12px;margin-top:3px}
.logo-img{width:60px;height:60px;border-radius:14px;object-fit:contain;margin:0 auto 8px;display:block;background:var(--card)}
.btn{padding:12px 24px;border:none;border-radius:12px;font-weight:700;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.bp{background:var(--saf);color:#1a1025}.bs{background:var(--card2);color:var(--txt)}.bd{background:var(--red);color:#fff}
.bf{width:100%}.bsm{padding:8px 16px;font-size:12px;border-radius:8px}.btn:disabled{opacity:.4;cursor:default}
.inp{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;color:var(--txt);font-size:14px}
.inp:focus{outline:none;border-color:var(--saf)}.inp::placeholder{color:var(--mut)}
.lbl{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}.fld{margin-bottom:14px}
.pnl{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
.pt{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rc{flex:1;background:var(--card);border:2px solid var(--brd);border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s}
.rc:hover{border-color:var(--saf);transform:translateY(-2px)}
.rc .ico{font-size:36px;margin-bottom:6px}.rc h3{font-size:15px;margin-bottom:3px}.rc p{font-size:11px;color:var(--mut)}
.tabs{display:flex;gap:3px;background:var(--card);border-radius:12px;padding:3px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:9px 4px;border:none;border-radius:9px;font-size:10px;font-weight:700;background:transparent;color:var(--mut);white-space:nowrap;min-width:50px}
.tab.on{background:var(--saf);color:#1a1025}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--brd);background:var(--card);color:var(--txt);cursor:pointer}.chip.on{background:var(--saf);color:#1a1025;border-color:var(--saf)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{background:var(--card);border-radius:16px;overflow:hidden;min-height:280px;margin-bottom:12px}
.fc-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--card2)}
.fc-body{padding:16px;text-align:center}.fc-g{font-size:32px;font-weight:800;margin-bottom:4px}.fc-e{font-size:14px;color:var(--mut)}.fc-blur{filter:blur(20px);user-select:none}
.abtn{width:56px;height:56px;border-radius:50%;border:none;background:var(--saf);color:#1a1025;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 15px rgba(245,166,35,.3)}.abtn:active{transform:scale(.95)}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qpw{width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;border:3px solid var(--brd);cursor:pointer;transition:all .15s}
.qpw:active{transform:scale(.96)}.qpw.ok{border-color:var(--grn);box-shadow:0 0 20px rgba(52,199,89,.4)}.qpw.no{border-color:var(--red);box-shadow:0 0 20px rgba(255,59,92,.4)}
.qpw img{width:100%;height:100%;object-fit:cover;display:block}
.fov{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:fi .4s ease-out forwards;pointer-events:none}
.fov-ok{background:rgba(52,199,89,.25)}.fov-no{background:rgba(255,59,92,.25)}.fov span{font-size:64px;animation:pi .3s ease-out}
@keyframes fi{0%{opacity:1}100%{opacity:0}}@keyframes pi{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.sb{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border-radius:12px;margin-bottom:12px}
.si{text-align:center}.sn{font-size:20px;font-weight:800}.sl{font-size:9px;color:var(--mut);text-transform:uppercase}
.sr{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}.sr:last-child{border-bottom:none}
.sa{width:36px;height:36px;border-radius:50%;background:var(--pur);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.sinfo{flex:1}.sname{font-weight:600;font-size:14px}.sstat{font-size:11px;color:var(--mut)}
.ci{display:flex;gap:10px;padding:10px;background:var(--card2);border-radius:10px;margin-bottom:8px;align-items:center}
.cth{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card)}
.ct{flex:1;min-width:0}.ct h4{font-size:14px;font-weight:600}.ct p{font-size:11px;color:var(--mut)}
.ua{border:2px dashed var(--brd);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:8px}
.ua:hover{border-color:var(--saf)}.ua.ok{border-color:var(--grn);border-style:solid}
.pimg{max-width:100%;max-height:150px;border-radius:8px;margin-top:8px}
.rrw{display:flex;gap:8px;align-items:center}
.rbtn{width:44px;height:44px;border-radius:50%;border:none;font-size:18px;display:flex;align-items:center;justify-content:center}
.rbtn.rec{background:var(--red);animation:pls 1s infinite}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,.4)}50%{box-shadow:0 0 0 10px rgba(255,59,92,0)}}
.bbtn{background:none;border:none;color:var(--mut);font-size:14px;font-weight:600;padding:8px 0;margin-bottom:8px;display:flex;align-items:center;gap:4px}.bbtn:hover{color:var(--txt)}
.ldr{display:inline-block;width:20px;height:20px;border:2.5px solid var(--brd);border-top-color:var(--saf);border-radius:50%;animation:sp .6s linear infinite}

.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}.ls p{color:var(--mut);font-size:13px}
.ey{text-align:center;padding:30px 20px;color:var(--mut)}.ey .ico{font-size:36px;margin-bottom:8px}.ey p{font-size:13px}
.tst{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;animation:ti .3s ease-out}
.tst-ok{background:var(--grn);color:#fff}.tst-err{background:var(--red);color:#fff}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

.mb-r{background:var(--card2);color:var(--txt);margin-right:auto;border-bottom-left-radius:4px}
.mb-t{font-size:10px;opacity:.6;margin-top:4px}.mb-n{font-size:10px;font-weight:700;color:var(--saf);margin-bottom:2px}
.mc{display:flex;gap:8px;margin-top:12px}
.mbdg{background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;padding:0 4px}
.pw-show{font-family:monospace;background:var(--card2);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--saf)}
.wod{background:linear-gradient(135deg,var(--saf)15,var(--pur)15);border:1.5px solid var(--saf)44;border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .3s}
.wod-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--saf);font-weight:700;margin-bottom:6px}

.bdg{background:var(--card2);border-radius:12px;padding:10px;text-align:center;width:calc(33.33% - 6px);opacity:.3}
.bdg.earned{opacity:1;border:1.5px solid var(--saf)}.bdg .ico{font-size:28px}.bdg .nm{font-size:10px;font-weight:600;margin-top:4px;color:var(--mut)}.bdg.earned .nm{color:var(--txt)}
.xp-bar{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.xp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:13px;font-weight:800;color:var(--saf)}.xp-pts{font-size:11px;color:var(--mut)}
.xp-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--saf),var(--pur));border-radius:3px;transition:width .5s ease}
.xp-next{font-size:10px;color:var(--mut);margin-top:4px;text-align:right}
.streak-bar{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.streak-fire{font-size:28px}.streak-num{font-size:22px;font-weight:800;color:var(--saf)}.streak-lbl{font-size:11px;color:var(--mut)}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall 3s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.welcome-msg{background:linear-gradient(135deg,var(--blu)22,var(--pur)22);border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px;line-height:1.5;color:var(--txt);border:1px solid var(--blu)33}
.lang-sel{background:var(--card2);border:1px solid var(--brd);border-radius:8px;color:var(--txt);padding:6px 10px;font-size:12px;font-weight:600}
.game-btn{background:linear-gradient(135deg,var(--pur),var(--blu));color:#fff;border:none;border-radius:14px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;width:100%;margin-bottom:8px;transition:all .2s}
.game-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(94,138,255,.3)}
.game-btn:active{transform:scale(.98)}

function tS(ts){if(!ts)return'Never';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'Now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

function confetti(){const c=document.createElement('div');c.className='confetti-container';const cl=['#F5A623','#34C759','#FF3B5C','#5E8AFF','#9B6DFF','#FFD700'];
  for(let i=0;i<50;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cl[Math.floor(Math.random()*cl.length)];
    p.style.animationDelay=Math.random()*2+'s';p.style.borderRadius=Math.random()>.5?'50%':'0';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p)}
  document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}

const LEVELS=[0,50,120,200,300,450,650,900,1200,1600,2100];
function getLevel(xp){let l=0;for(let i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i])l=i;else break}return l}
function getLN(l){return['Beginner','Starter','Learner','Explorer','Achiever','Scholar','Expert','Master','Legend','Champion','Guru'][l]||'Guru'}
function xpInfo(xp){const l=getLevel(xp);const n=LEVELS[l+1]||LEVELS[LEVELS.length-1];return{level:l,name:getLN(l),current:xp,needed:n,progress:Math.min(100,((xp-(LEVELS[l]||0))/(n-(LEVELS[l]||0)))*100)}}
async function addXP(sid,amt){const d=await db.collection('students').doc(sid).get();const o=d.data().xp||0;const ol=getLevel(o);const n=o+amt;const nl=getLevel(n);await db.collection('students').doc(sid).update({xp:n});if(nl>ol)confetti();return n}
async function updStreak(sid){const d=await db.collection('students').doc(sid).get();const data=d.data();const today=new Date().toISOString().split('T')[0];
  if(data.lastPracticeDate===today)return data.streak||0;const y=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const ns=data.lastPracticeDate===y?(data.streak||0)+1:1;await db.collection('students').doc(sid).update({streak:ns,lastPracticeDate:today});return ns}

function compImg(f,mx=400,q=0.7){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>mx){h=h*mx/w;w=mx}}else{if(h>mx){w=w*mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(f)})}

async function getMsgs(u1,u2){const s1=await db.collection('messages').where('fromId','==',u1).where('toId','==',u2).get();const s2=await db.collection('messages').where('fromId','==',u2).where('toId','==',u1).get();const m=[...s1.docs.map(d=>({id:d.id,...d.data()})),...s2.docs.map(d=>({id:d.id,...d.data()}))];m.sort((a,b)=>a.timestamp-b.timestamp);return m}
async function markRd(uid,fid){const s=await db.collection('messages').where('toId','==',uid).where('fromId','==',fid).where('read','==',false).get();if(s.size){const b=db.batch();s.docs.forEach(d=>b.update(d.ref,{read:true}));await b.commit()}}

const BADGES=[{id:'first_quiz',ico:'🌟',name:'First Steps'},{id:'quiz5',ico:'📖',name:'Learner'},{id:'quiz15',ico:'🏆',name:'Quiz Master'},
  {id:'perfect',ico:'🎯',name:'Perfect'},{id:'cards50',ico:'📚',name:'Bookworm'},{id:'cards100',ico:'🧠',name:'Big Brain'},
  {id:'streak7',ico:'🔥',name:'On Fire'},{id:'level5',ico:'👑',name:'Rising Star'}];
async function chkBadges(sid){const aS=await db.collection('activity').where('studentId','==',sid).get();const acts=aS.docs.map(d=>d.data());
  const doc=await db.collection('students').doc(sid).get();const sD=doc.data();const qz=acts.filter(a=>a.type==='quiz_complete');
  const tc=acts.filter(a=>a.type==='practice').reduce((s,a)=>s+(a.cardsViewed||0),0);const earned=[];
  if(qz.length>=1)earned.push('first_quiz');if(qz.length>=5)earned.push('quiz5');if(qz.length>=15)earned.push('quiz15');
  if(qz.some(q=>q.score===q.total&&q.total>0))earned.push('perfect');if(tc>=50)earned.push('cards50');if(tc>=100)earned.push('cards100');
  if((sD.streak||0)>=7)earned.push('streak7');if(getLevel(sD.xp||0)>=5)earned.push('level5');
  await db.collection('students').doc(sid).update({badges:earned});return earned}

  <div class="rc" onclick="lP('teacher')"><div class="ico">👩‍🏫</div><h3>${t('teacher')}</h3><p>${t('cardsStudents')}</p></div></div>
  <div class="rc" onclick="lP('student')" style="width:100%"><div class="ico">🧑‍🎓</div><h3>${t('student')}</h3><p>${t('learnPractice')}</p></div></div>`}

function lP(role){const ti={admin:'🛡️ '+t('admin'),teacher:'👩‍🏫 '+t('teacher'),student:'🧑‍🎓 '+t('student')};
  let h=`<div class="hdr">${logoH()}<h1>${ti[role]} ${t('login')}</h1></div><div style="text-align:right;margin-bottom:8px">${langSel()}</div><div class="pnl">`;
  if(role!=='admin')h+=`<div class="fld"><label class="lbl">${t('username')}</label><input class="inp" id="lU" placeholder="${t('username')}"></div>`;
  h+=`<div class="fld"><label class="lbl">${t('password')}</label><input class="inp" type="password" id="lPw" placeholder="${t('password')}" onkeydown="if(event.key==='Enter')doLogin('${role}')"></div>
  <button class="btn bp bf" id="lB" onclick="doLogin('${role}')">${t('login')}</button></div><button class="bbtn" onclick="S.role=null;R()">${t('back')}</button>`;app.innerHTML=h}

async function doLogin(role){const btn=$('lB');btn.disabled=true;btn.textContent='...';
  try{if(role==='admin'){if($('lPw').value!==ADMIN_PASSWORD){toast(t('wrongPassword'),'err');btn.disabled=false;btn.textContent=t('login');return}
    S.role='admin';S.uid='admin';S.uname='Admin';S.tab='teachers';await initA();return}
    const u=$('lU').value.trim().toLowerCase(),p=$('lPw').value.trim();if(!u||!p){toast(t('fillAll'),'err');btn.disabled=false;btn.textContent=t('login');return}
    const col=role==='teacher'?'teachers':'students';const snap=await db.collection(col).where('username','==',u).get();
    if(snap.empty){toast(t('notFound'),'err');btn.disabled=false;btn.textContent=t('login');return}
    const doc=snap.docs[0],data=doc.data();if(data.password!==p){toast(t('wrongPassword'),'err');btn.disabled=false;btn.textContent=t('login');return}
    S.uid=doc.id;S.uname=data.name||data.username;S.role=role;
    if(role==='teacher'){S.tab='cards';await initTP()}
    else{S.teacherId=data.teacherId;S.view='home';await db.collection('students').doc(doc.id).update({lastSeen:Date.now()});await ldCats(data.teacherId);S.unread=await getUnrd(S.uid);R()}
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent=t('login')}}

async function initA(){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';await ldT();await ldStu();rAdmin()}

<div class="tabs">

  <button class="tab ${S.tab==='allStudents'?'on':''}" onclick="S.tab='allStudents';R()">👥</button>
  <button class="tab ${S.tab==='adminMsg'?'on':''}" onclick="S.tab='adminMsg';R()">💬</button>

function rASt(){return`<div class="pnl"><div class="pt">🖼️ ${t('appLogo')}</div>
  ${S.logo?'<img src="'+S.logo+'" style="width:80px;height:80px;border-radius:14px;object-fit:contain;display:block;margin-bottom:10px;background:var(--card2)">':''}
  <div class="ua" onclick="$('logoF').click()"><div class="ico">📸</div><p>${t('uploadLogo')}</p></div>
  <input type="file" accept="image/*" id="logoF" style="display:none" onchange="upLogo(this)"></div>
  <div class="pnl"><div class="pt">📝 ${t('welcomeMessage')}</div><p style="font-size:11px;color:var(--mut);margin-bottom:8px">${t('shownToStudents')}</p>
  <div class="fld"><textarea class="inp" id="wmT" rows="3" placeholder="${t('welcomeMessage')}">${S.welcomeMsg}</textarea></div>

async function upLogo(i){if(!i.files[0])return;try{const d=await compImg(i.files[0],200,0.8);await svSet({logo:d});toast(t('saved'));rAdmin()}catch(e){toast('Error','err')}}
async function svWM(){await svSet({welcomeMsg:$('wmT').value.trim()});S.welcomeMsg=S.settings.welcomeMsg;toast(t('saved'))}

function rAT(){let h=`<div class="pnl"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <div class="pt" style="margin:0">👩‍🏫 ${t('teachers')} (${S.teachers.length})</div><button class="btn bp bsm" onclick="showAT()">+ ${t('add')}</button></div>`;
  if(!S.teachers.length)h+='<div class="ey"><p>'+t('noTeachers')+'</p></div>';
  else S.teachers.forEach(x=>{const sc=S.students.filter(s=>s.teacherId===x.id).length;
    h+=`<div class="ci"><div class="sa">${(x.name||'T')[0]}</div><div class="ct"><h4>${x.name}</h4><p>@${x.username} · <span class="pw-show">${x.password}</span> · ${sc} ${t('students').toLowerCase()}</p></div>
    <div style="display:flex;gap:4px;flex-direction:column"><button class="btn bsm bs" onclick="editAT('${x.id}')">✏️</button><button class="btn bsm bd" onclick="delAT('${x.id}')">🗑</button></div></div>`});
  return h+'</div>'}
function showAT(){app.innerHTML=`<button class="bbtn" onclick="rAdmin()">${t('back')}</button><div class="pnl"><div class="pt">➕ ${t('addTeacher')}</div>
  <div class="fld"><label class="lbl">${t('fullName')}</label><input class="inp" id="tN"></div>
  <div class="fld"><label class="lbl">${t('username')}</label><input class="inp" id="tU" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')"></div>
  <div class="fld"><label class="lbl">${t('password')}</label><input class="inp" id="tP"></div>
  <button class="btn bp bf" onclick="addAT()">✅ ${t('create')}</button></div>`}
async function addAT(){const n=$('tN').value.trim(),u=$('tU').value.trim(),p=$('tP').value.trim();if(!n||!u||!p)return toast(t('fillAll'),'err');if(p.length<4)return toast(t('minChars'),'err');
  if(!(await db.collection('teachers').where('username','==',u).get()).empty)return toast(t('usernameTaken'),'err');
  await db.collection('teachers').add({name:n,username:u,password:p,createdAt:Date.now()});await ldT();toast(t('created'));rAdmin()}
function editAT(tid){const x=S.teachers.find(v=>v.id===tid);app.innerHTML=`<button class="bbtn" onclick="rAdmin()">${t('back')}</button><div class="pnl"><div class="pt">✏️ ${t('edit')} ${x.name}</div>
  <div class="fld"><label class="lbl">${t('name')}</label><input class="inp" id="eN" value="${x.name}"></div>
  <div class="fld"><label class="lbl">${t('password')}</label><input class="inp" id="eP" value="${x.password}"></div>
  <button class="btn bp bf" onclick="svAT('${tid}')">${t('save')}</button></div>`}
async function svAT(tid){await db.collection('teachers').doc(tid).update({name:$('eN').value.trim(),password:$('eP').value.trim()});await ldT();toast(t('saved'));rAdmin()}
async function delAT(tid){if(!confirm(t('delete')+'?'))return;for(const c of['students','cards','categories']){const s=await db.collection(c).where('teacherId','==',tid).get();if(s.size){const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit()}}
  await db.collection('teachers').doc(tid).delete();await ldT();await ldStu();toast(t('deleted'));rAdmin()}

function rAS(){let h=`<div class="pnl"><div class="pt">👥 ${t('students')} (${S.students.length})</div>`;
  if(!S.students.length)h+='<div class="ey"><p>'+t('noStudents')+'</p></div>';
  else{const byT={};S.students.forEach(s=>{const tid=s.teacherId||'?';if(!byT[tid])byT[tid]=[];byT[tid].push(s)});
    for(const tid in byT){const x=S.teachers.find(v=>v.id===tid);h+=`<div style="font-size:12px;font-weight:700;color:var(--saf);margin:12px 0 6px">👩‍🏫 ${x?x.name:'?'}</div>`;
      byT[tid].forEach(s=>{h+=`<div class="ci"><div class="sa">${(s.name||'S')[0]}</div><div class="ct"><h4>${s.name||s.username}</h4>
      <p>@${s.username} · <span class="pw-show">${s.password}</span></p></div><button class="btn bsm bs" onclick="aES('${s.id}')">✏️</button></div>`})}}
  return h+'</div>'}
function aES(sid){const s=S.students.find(x=>x.id===sid);app.innerHTML=`<button class="bbtn" onclick="rAdmin()">${t('back')}</button><div class="pnl"><div class="pt">✏️ ${s.name}</div>
  <div class="fld"><label class="lbl">${t('name')}</label><input class="inp" id="esN" value="${s.name||''}"></div>
  <div class="fld"><label class="lbl">${t('password')}</label><input class="inp" id="esP" value="${s.password||''}"></div>
  <button class="btn bp bf" onclick="svAS('${sid}')">${t('save')}</button><button class="btn bd bf" style="margin-top:8px" onclick="delAS('${sid}')">🗑 ${t('delete')}</button></div>`}
async function svAS(sid){await db.collection('students').doc(sid).update({name:$('esN').value.trim(),password:$('esP').value.trim()});await ldStu();toast(t('saved'));rAdmin()}
async function delAS(sid){if(!confirm(t('delete')+'?'))return;await db.collection('students').doc(sid).delete();await ldStu();toast(t('deleted'));rAdmin()}

function rAM(){let h=`<div class="pnl"><div class="pt">💬 ${t('messages')}</div>
  <div class="ci" style="cursor:pointer;border:1px solid var(--saf)33" onclick="aBc('students')"><div style="font-size:24px">📢</div><div class="ct"><h4>${t('students')}</h4><p>${t('sendToAll')}</p></div></div>
  <div class="ci" style="cursor:pointer;border:1px solid var(--pur)33" onclick="aBc('teachers')"><div style="font-size:24px">👩‍🏫</div><div class="ct"><h4>${t('teachers')}</h4><p>${t('sendToAll')}</p></div></div>`;
  S.teachers.forEach(x=>{h+=`<div class="sr" style="cursor:pointer" onclick="aChat('${x.id}','${esc(x.name)}')"><div class="sa" style="background:var(--saf)">${(x.name||'T')[0]}</div><div class="sinfo"><div class="sname">${x.name}</div></div><div style="color:var(--mut)">›</div></div>`});
  return h+'</div>'}
async function aBc(target){app.innerHTML=`<button class="bbtn" onclick="rAdmin()">${t('back')}</button><div class="pnl"><div class="pt">📢 ${t('broadcast')}</div>
  <div class="fld"><textarea class="inp" id="bcM" rows="3" placeholder="${t('typeMessage')}"></textarea></div>
  <button class="btn bp bf" id="bcB" onclick="sndABc('${target}')">📢 ${t('send')}</button></div>`}
async function sndABc(target){const txt=$('bcM').value.trim();if(!txt)return toast(t('enterMessage'),'err');$('bcB').disabled=true;
  for(const u of(target==='teachers'?S.teachers:S.students))await sendMsg('admin','Admin','admin',u.id,u.name||u.username,txt);toast(t('sent'));rAdmin()}
async function aChat(uid,name){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';await markRd('admin',uid);const msgs=await getMsgs('admin',uid);
  let h=`<button class="bbtn" onclick="rAdmin()">${t('back')}</button><div class="pnl"><div class="pt">💬 ${name}</div><div class="ml" id="mL">`;
  if(!msgs.length)h+='<div class="ey"><p>'+t('noMessages')+'</p></div>';
  else msgs.forEach(m=>{const s=m.fromId==='admin';h+=`<div class="mb ${s?'mb-s':'mb-r'}">${!s?'<div class="mb-n">'+m.fromName+'</div>':''}${m.text}<div class="mb-t">${fmt(m.timestamp)}</div></div>`});
  h+=`</div><div class="mc"><input class="inp" id="mI" placeholder="${t('typeMessage')}" onkeydown="if(event.key==='Enter')sndAM('${uid}','${esc(name)}')">
  <button class="btn bp bsm" onclick="sndAM('${uid}','${esc(name)}')">${t('send')}</button></div></div>`;app.innerHTML=h;const l=$('mL');if(l)l.scrollTop=l.scrollHeight}
async function sndAM(uid,name){const x=$('mI').value.trim();if(!x)return;$('mI').value='';await sendMsg('admin','Admin','admin',uid,name,x);aChat(uid,name)}

// Teacher Categories (with edit)
function rTCats(){let h=`<div class="pnl"><div class="pt">📁 ${t('categories')}</div><div class="fld"><div style="display:flex;gap:6px">
  <input class="inp" id="ncN" placeholder="${t('englishName')}"><input class="inp" id="ncG" placeholder="${t('gurmukhi')}" style="max-width:100px">
  <button class="btn bp bsm" onclick="addCat()">+</button></div></div>
  <div class="fld"><label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)"><input type="checkbox" id="ncS"> ${t('shared')}</label></div>`;
  S.cats.forEach(c=>{const n=S.cards.filter(x=>x.categoryId===c.id).length;const sh=c.teacherId==='shared';
    h+=`<div class="ci"><div style="font-size:18px">${sh?'🌐':'📚'}</div><div class="ct"><h4>${c.name}</h4><p>${c.gurmukhi||''} · ${n} ${t('cards').toLowerCase()}${sh?' · '+t('shared'):''}</p></div>
    <div style="display:flex;gap:4px"><button class="btn bsm bs" onclick="editCat('${c.id}')">✏️</button><button class="btn bsm bd" onclick="delCat('${c.id}')">🗑</button></div></div>`});
  return h+'</div>'}
async function addCat(){const n=$('ncN').value.trim(),g=$('ncG').value.trim(),sh=$('ncS').checked;if(!n)return toast(t('enterName'),'err');
  await db.collection('categories').add({name:n,gurmukhi:g,emoji:'📚',teacherId:sh?'shared':S.uid,createdAt:Date.now()});await ldCats(S.uid);await ldAC(S.uid);toast(t('created'));rTeacher()}
function editCat(cid){const c=S.cats.find(x=>x.id===cid);app.innerHTML=`<button class="bbtn" onclick="rTeacher()">${t('back')}</button><div class="pnl"><div class="pt">✏️ ${t('editCategory')}</div>
  <div class="fld"><label class="lbl">${t('englishName')}</label><input class="inp" id="ecN" value="${c.name}"></div>
  <div class="fld"><label class="lbl">${t('gurmukhi')}</label><input class="inp" id="ecG" value="${c.gurmukhi||''}"></div>
  <button class="btn bp bf" onclick="svCat('${cid}')">${t('save')}</button></div>`}
async function svCat(cid){await db.collection('categories').doc(cid).update({name:$('ecN').value.trim(),gurmukhi:$('ecG').value.trim()});await ldCats(S.uid);toast(t('saved'));rTeacher()}
async function delCat(id){if(!confirm(t('delete')+'?'))return;const s=await db.collection('cards').where('categoryId','==',id).get();const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));b.delete(db.collection('categories').doc(id));await b.commit();await ldCats(S.uid);await ldAC(S.uid);toast(t('deleted'));rTeacher()}

  <div class="chips"><div class="chip ${S.selCat===null?'on':''}" onclick="S.selCat=null;fC()">${t('all')}</div>`;

  const fl=S.selCat?S.cards.filter(c=>c.categoryId===S.selCat):S.cards;
  if(!fl.length)h+='<div class="ey"><p>'+t('noCards')+'</p></div>';
  else fl.forEach(c=>{h+=`<div class="ci">${c.imageUrl?'<img class="cth" src="'+c.imageUrl+'">':'<div class="cth" style="display:flex;align-items:center;justify-content:center">🖼</div>'}

  return h+'</div>'}
async function fC(){if(S.selCat)await ldCards(S.selCat);else await ldAC(S.uid);rTeacher()}
async function delCrd(id){if(!confirm(t('delete')+'?'))return;await db.collection('cards').doc(id).delete();await ldAC(S.uid);toast(t('deleted'));rTeacher()}

function editCrd(cid){const c=S.cards.find(x=>x.id===cid);
  app.innerHTML=`<button class="bbtn" onclick="rTeacher()">${t('back')}</button><div class="pnl"><div class="pt">✏️ ${t('editCard')}</div>

  <div class="fld"><label class="lbl">${t('english')}</label><input class="inp" id="ecCE" value="${c.english}"></div>

  <button class="btn bp bf" onclick="svCrd('${cid}')">${t('save')}</button></div>`}
async function svCrd(cid){await db.collection('cards').doc(cid).update({gurmukhi:$('ecCG').value.trim(),english:$('ecCE').value.trim()});await ldAC(S.uid);toast(t('saved'));rTeacher()}

function showAC(){recBlob=null;let h=`<button class="bbtn" onclick="S.tab='cards';rTeacher()">${t('back')}</button><div class="pnl"><div class="pt">✏️ ${t('addCard')}</div>
  <div class="fld"><label class="lbl">${t('selectCategory')}</label><select class="inp" id="cC">`;S.cats.forEach(c=>{h+=`<option value="${c.id}">${c.name}</option>`});
  h+=`</select></div><div class="fld"><label class="lbl">${t('gurmukhi')}</label><input class="inp" id="cG" placeholder="ਸੇਬ" style="font-size:20px"></div>
  <div class="fld"><label class="lbl">${t('english')}</label><input class="inp" id="cE" placeholder="Apple"></div>
  <div class="fld"><label class="lbl">${t('picture')}</label><div class="ua" onclick="$('iF').click()"><div class="ico">📸</div><p>${t('tapUpload')}</p></div>
  <input type="file" accept="image/*" id="iF" style="display:none" onchange="pvI(this)"><div id="iPv"></div></div>
  <div class="fld"><label class="lbl">${t('audio')}</label><div class="rrw"><button class="rbtn bs" id="rB" onclick="tgR()" style="background:var(--red)">🎙</button><div id="aS" style="flex:1;font-size:12px;color:var(--mut)">${t('tapRecord')}</div></div>
  <div style="margin-top:8px"><input type="file" accept="audio/*" id="aF" onchange="pvAF(this)" style="font-size:12px;color:var(--mut)"></div><div id="aPv" style="margin-top:8px"></div></div>
  <div class="fld"><label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)"><input type="checkbox" id="cSh"> ${t('shared')}</label></div>

        <button class="btn bp" onclick="clearInterval(rndT);startRW()">🎲 ${t('next')}</button></div></div></div>`;
  let sec=10;rndT=setInterval(()=>{sec--;const el=$('rS'),ci=$('rC');if(el)el.textContent=sec;if(ci)ci.style.strokeDashoffset=((10-sec)/10)*220;
    if(sec<=0){clearInterval(rndT);const ta=$('rTA'),rv=$('rRv');if(ta)ta.style.display='none';if(rv)rv.style.display='block';playA(S.rndC.audioUrl)}},1000)}

// Speed Round game
let spdT=null,spdSec=60,spdScore=0,spdCards=[];
async function stSpd(){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';await ldAC(S.teacherId);
  const wb=S.cards.filter(c=>c.imageUrl&&c.audioUrl);if(wb.length<4){toast(t('need4Cards'),'err');S.view='home';R();return}
  spdCards=shuf(wb);spdSec=60;spdScore=0;S.view='speedRound';rSpd();spdT=setInterval(()=>{spdSec--;const el=$('spdTime');if(el)el.textContent=spdSec;if(spdSec<=0){clearInterval(spdT);endSpd()}},1000)}

function rSpd(){
  if(spdCards.length<4){endSpd();return}
  const pick=spdCards.splice(0,4);const correct=pick[Math.floor(Math.random()*4)];const shuffled=shuf(pick);
  app.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="bbtn" style="margin:0" onclick="clearInterval(spdT);S.view='home';R()">✕</button>
    <div style="font-size:18px;font-weight:800;color:var(--red)" id="spdTime">${spdSec}</div>
    <div style="font-size:16px;font-weight:800;color:var(--saf)">⭐ ${spdScore}</div></div>
  <div style="text-align:center;margin-bottom:12px"><div style="font-size:13px;color:var(--mut);margin-bottom:8px">⚡ ${t('speedRound')}</div>
  <button class="abtn" onclick="playA('${correct.audioUrl}')" style="width:60px;height:60px;font-size:26px">🔊</button></div>
  <div class="qg">${shuffled.map(c=>`<div class="qpw" id="sp_${c.id}" onclick="spdAns('${c.id}','${correct.id}')"><img src="${c.imageUrl}"></div>`).join('')}</div>`;
  playA(correct.audioUrl)}

function spdAns(cid,corId){const ok=cid===corId;$('sp_'+cid).classList.add(ok?'ok':'no');if(!ok)$('sp_'+corId)?.classList.add('ok');
  if(ok){spdScore++;flash('ok')}else flash('no');setTimeout(()=>{if(spdSec>0&&spdCards.length>=4)rSpd();else if(spdSec>0&&spdCards.length<4){spdCards=shuf(S.cards.filter(c=>c.imageUrl&&c.audioUrl));rSpd()}else endSpd()},600)}

async function endSpd(){clearInterval(spdT);
  await recAct('quiz_complete',{categoryName:'Speed Round',score:spdScore,total:spdScore+5,timeSpent:60});
  await addXP(S.uid,spdScore*10);await updStreak(S.uid);
  if(spdScore>=10)confetti();
  app.innerHTML=`<div style="text-align:center;padding:40px 0">
    <div style="font-size:70px;margin-bottom:12px">⚡</div><h2 style="font-size:22px">⚡ ${t('speedRound')}</h2>
    <div style="font-size:48px;font-weight:800;color:var(--saf);margin:12px 0">${spdScore}</div>
    <div style="font-size:14px;color:var(--mut)">+${spdScore*10} XP</div></div>
  <div style="display:flex;gap:10px;margin-top:20px">
    <button class="btn bs" style="flex:1" onclick="S.view='home';R()">🏠 ${t('home')}</button>
    <button class="btn bp" style="flex:1" onclick="stSpd()">🔄 ${t('retry')}</button></div>`}

// Student Badges
async function rSB(){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';const earned=await chkBadges(S.uid);
  let h=`<button class="bbtn" onclick="S.view='home';R()">${t('back')}</button><div class="pnl"><div class="pt">🏅 ${t('badges')} (${earned.length}/${BADGES.length})</div><div class="bdg-grid">`;
  BADGES.forEach(b=>{h+=`<div class="bdg ${earned.includes(b.id)?'earned':''}"><div class="ico">${b.ico}</div><div class="nm">${b.name}</div></div>`});
  h+='</div></div>';app.innerHTML=h}

// Student Messages
async function rSM(){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';
  await markRd(S.uid,'teacher');await markRd(S.uid,S.teacherId);await markRd(S.uid,'admin');S.unread=0;
  const m1=await getMsgs(S.uid,S.teacherId);const m2=await getMsgs(S.uid,'admin');const m3=await getMsgs(S.uid,'teacher');
  const msgs=[...m1,...m2,...m3].filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);msgs.sort((a,b)=>a.timestamp-b.timestamp);
  let h=`<button class="bbtn" onclick="S.view='home';R()">${t('back')}</button><div class="pnl"><div class="pt">💬 ${t('messages')}</div><div class="ml" id="mL">`;
  if(!msgs.length)h+='<div class="ey"><p>'+t('noMessages')+'</p></div>';
  else msgs.forEach(m=>{const s=m.fromId===S.uid;h+=`<div class="mb ${s?'mb-s':'mb-r'}">${!s?'<div class="mb-n">'+m.fromName+'</div>':''}${m.text}<div class="mb-t">${fmt(m.timestamp)}</div></div>`});
  h+=`</div><div class="mc"><input class="inp" id="mI" placeholder="${t('typeMessage')}" onkeydown="if(event.key==='Enter')sndSM()"><button class="btn bp bsm" onclick="sndSM()">${t('send')}</button></div></div>`;
  app.innerHTML=h;const l=$('mL');if(l)l.scrollTop=l.scrollHeight}
async function sndSM(){const x=$('mI').value.trim();if(!x)return;$('mI').value='';await sendMsg(S.uid,S.uname,'student',S.teacherId,'Teacher',x);rSM()}

// Student Practice
async function stPrac(cid,cn){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';await ldCards(cid);if(!S.cards.length){toast(t('noContent'),'err');S.view='home';R();return}
  S.flashCards=shuf(S.cards);S.flashIdx=0;S.flashRev=false;S.view='practice';S.pS=Date.now();S.pC=cn;S.pV=0;R()}
function rSP(){const c=S.flashCards[S.flashIdx];if(!c){S.view='home';R();return}
  let h=`<button class="bbtn" onclick="endP()">${t('back')}</button><div style="text-align:center;font-size:12px;color:var(--mut);margin-bottom:8px">${S.flashIdx+1}/${S.flashCards.length}</div>
  <div class="fc">${c.imageUrl?'<img class="fc-img" src="'+c.imageUrl+'">':'<div class="fc-img" style="display:flex;align-items:center;justify-content:center;font-size:50px">🖼</div>'}
  <div class="fc-body">`;
  if(S.flashRev){h+=`<div class="fc-g">${c.gurmukhi}</div><div class="fc-e">${c.english}</div>`;if(c.audioUrl)h+='<div style="margin-top:10px"><button class="abtn" onclick="playA(\''+c.audioUrl+'\')">🔊</button></div>'}
  else h+='<div class="fc-g fc-blur">ਅੱਖਰ</div>';h+='</div></div>';
  if(!S.flashRev)h+=`<button class="btn bp bf" onclick="S.flashRev=true;S.pV++;R()">👀 ${t('reveal')}</button>`;
  else{h+='<div style="display:flex;gap:8px">';if(S.flashIdx>0)h+=`<button class="btn bs" style="flex:1" onclick="S.flashIdx--;S.flashRev=false;R()">← ${t('prev')}</button>`;
    h+=S.flashIdx<S.flashCards.length-1?`<button class="btn bp" style="flex:1" onclick="S.flashIdx++;S.flashRev=false;R()">${t('next')} →</button>`:`<button class="btn bp" style="flex:1" onclick="endP()">✅ ${t('done')}</button>`;h+='</div>'}
  app.innerHTML=h}
async function endP(){const tm=Math.round((Date.now()-S.pS)/1000);await recAct('practice',{categoryName:S.pC,cardsViewed:S.pV,timeSpent:tm});
  await addXP(S.uid,S.pV*5);await updStreak(S.uid);S.view='home';await ldCats(S.teacherId);R()}

// Student Quiz
async function stQuiz(cid,cn){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';
  const qgS=await db.collection('quizGroups').where('categoryId','==',cid).get();const groups=qgS.docs.map(d=>({id:d.id,...d.data()}));
  await ldCards(cid);if(S.cards.length<4){toast(t('need4Cards'),'err');S.view='home';R();return}
  let rounds=[];for(const g of groups){const gc=g.cardIds.map(id=>S.cards.find(c=>c.id===id)).filter(Boolean);if(gc.length===4){const cor=gc[Math.floor(Math.random()*4)];rounds.push({cards:shuf(gc),cId:cor.id,aUrl:cor.audioUrl})}}
  let att=0;while(rounds.length<5&&att<50){att++;const pk=shuf(S.cards).slice(0,4);if(pk.length<4||!pk.every(c=>c.imageUrl))continue;const wa=pk.filter(c=>c.audioUrl);if(!wa.length)continue;
    const cor=wa[Math.floor(Math.random()*wa.length)];rounds.push({cards:shuf(pk),cId:cor.id,aUrl:cor.audioUrl})}
  if(!rounds.length){toast(t('noContent'),'err');S.view='home';R();return}
  S.qCards=shuf(rounds);S.qIdx=0;S.qScore=0;S.qTotal=S.qCards.length;S.qStart=Date.now();S.qAns=false;S.qCat=cn;S.view='quiz';R()}

function rSQ(){if(S.qIdx>=S.qCards.length){showQR();return}const r=S.qCards[S.qIdx];
  app.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="bbtn" style="margin:0" onclick="S.view='home';R()">✕</button><div style="font-size:12px;color:var(--mut)">${S.qIdx+1}/${S.qTotal}</div>
    <div style="font-size:16px;font-weight:800;color:var(--saf)">⭐${S.qScore}</div></div>
  <div style="text-align:center;margin-bottom:14px"><div style="font-size:13px;color:var(--mut);margin-bottom:8px">${t('listenTap')}</div>
  <button class="abtn" onclick="playA('${r.aUrl}')" style="width:60px;height:60px;font-size:26px">🔊</button></div>
  <div class="qg">${r.cards.map(c=>`<div class="qpw" id="q_${c.id}" onclick="ansQ('${c.id}')"><img src="${c.imageUrl}"></div>`).join('')}</div>`}

function ansQ(cid){if(S.qAns)return;S.qAns=true;const r=S.qCards[S.qIdx],ok=cid===r.cId;
  $('q_'+cid).classList.add(ok?'ok':'no');if(!ok)$('q_'+r.cId)?.classList.add('ok');
  if(ok){S.qScore++;flash('ok')}else flash('no');playA(r.aUrl);
  const btn=document.createElement('button');btn.className='btn bp bf';btn.style.marginTop='12px';
  btn.textContent=S.qIdx<S.qTotal-1?t('nextRound'):t('seeResults');btn.onclick=()=>{S.qIdx++;S.qAns=false;S.qIdx>=S.qCards.length?showQR():R()};app.querySelector('.qg').after(btn)}
function flash(ty){const o=document.createElement('div');o.className='fov fov-'+ty;o.innerHTML='<span>'+(ty==='ok'?'✅':'❌')+'</span>';document.body.appendChild(o);setTimeout(()=>o.remove(),500)}

async function showQR(){const tm=Math.round((Date.now()-S.qStart)/1000),pct=Math.round(S.qScore/S.qTotal*100);
  let em,mg;if(pct>=90){em='🏆';mg=t('amazing')}else if(pct>=70){em='🌟';mg=t('greatJob')}else if(pct>=50){em='💪';mg=t('goodEffort')}else{em='📚';mg=t('keepLearning')}
  await recAct('quiz_complete',{categoryName:S.qCat,score:S.qScore,total:S.qTotal,timeSpent:tm});
  const xpE=S.qScore*15+(pct===100?50:0);await addXP(S.uid,xpE);await updStreak(S.uid);if(pct===100)confetti();await chkBadges(S.uid);
  app.innerHTML=`<div style="text-align:center;padding:30px 0">
    <div style="font-size:70px;margin-bottom:12px">${em}</div><h2 style="font-size:22px">${mg}</h2>
    <div style="font-size:44px;font-weight:800;color:var(--saf);margin:12px 0">${S.qScore}/${S.qTotal}</div>
    <div style="font-size:13px;color:var(--mut)">${pct}% · +${xpE} XP</div>
    ${pct===100?'<div style="margin-top:10px;font-size:14px;color:var(--saf);font-weight:700">🎉 '+t('perfect')+'</div>':''}</div>
  <div style="display:flex;gap:10px;margin-top:16px">
    <button class="btn bs" style="flex:1" onclick="S.view='home';R()">🏠 ${t('home')}</button>
    <button class="btn bp" style="flex:1" onclick="stQuiz('${S.cards[0]?.categoryId}','${esc(S.qCat)}')">🔄 ${t('retry')}</button></div>`}

// ---- INIT ----
async function init(){try{await ldSet();await db.collection('categories').limit(1).get();R()}catch(e){app.innerHTML='<div class="hdr"><h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1></div><div class="pnl" style="text-align:center"><p style="color:var(--red)">'+e.message+'</p></div>'}}
init();

</script>
</body>
</html>
